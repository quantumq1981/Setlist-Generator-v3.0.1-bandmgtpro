                          <button className="btn btn-small" onClick={() => onDeleteBooking(b.id)} style={{ color: 'var(--error)', borderColor: 'var(--error)' }}>✕</button>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          </div>
        );
      };

      const renderSettingsTab = () => {
        const tpls = localEpk.templates || EMAIL_TEMPLATES_DEFAULT;
        const curTpl = tpls[tplKey] || EMAIL_TEMPLATES_DEFAULT[tplKey];
        const upd = (field, val) => { setLocalEpk({...localEpk, [field]: val}); setEpkDirty(true); };
        const updTpl = (field, val) => { setLocalEpk({...localEpk, templates: { ...tpls, [tplKey]: { ...curTpl, [field]: val } }}); setEpkDirty(true); };
        return (
          <div>
            <div style={{ borderBottom: '1px solid var(--border)', paddingBottom: '.75rem', marginBottom: '.75rem' }}>
              <div style={{ fontWeight: 700, fontSize: '.85rem', marginBottom: '.5rem' }}>EPK &amp; Contact Links</div>
              <div className="set-config">
                <div className="input-group"><label>EPK URL</label><input value={localEpk.epkUrl || ''} onChange={e => upd('epkUrl', e.target.value)} placeholder="https://your-epk.com" /></div>
                <div className="input-group"><label>Demo Video URL</label><input value={localEpk.demoVideoUrl || ''} onChange={e => upd('demoVideoUrl', e.target.value)} placeholder="https://youtu.be/..." /></div>
                <div className="input-group"><label>Contact Email</label><input value={localEpk.contactEmail || ''} onChange={e => upd('contactEmail', e.target.value)} placeholder="booking@yourband.com" /></div>
                <div className="input-group"><label>Contact Phone</label><input value={localEpk.contactPhone || ''} onChange={e => upd('contactPhone', e.target.value)} placeholder="(555) 000-0000" /></div>
              </div>
              <div className="input-group"><label>Website</label><input value={localEpk.website || ''} onChange={e => upd('website', e.target.value)} placeholder="https://yourband.com" /></div>
              {epkDirty && <button className="btn btn-primary btn-small" onClick={() => { onSaveEpkSettings(localEpk); setEpkDirty(false); showToast('Settings saved', 'success'); }}>Save Settings</button>}
            </div>
            <div>
              <div style={{ fontWeight: 700, fontSize: '.85rem', marginBottom: '.5rem' }}>Email Templates</div>
              <div style={{ display: 'flex', gap: '.35rem', flexWrap: 'wrap', marginBottom: '.65rem' }}>
                {Object.entries(EMAIL_TEMPLATES_DEFAULT).map(([key, def]) => (
                  <button key={key} className={`btn btn-small${tplKey === key ? ' btn-toggle-active' : ''}`} onClick={() => setTplKey(key)}>{def.label}</button>
                ))}
              </div>
              <div style={{ fontSize: '.7rem', color: 'var(--text-muted)', marginBottom: '.5rem', lineHeight: 1.6 }}>
                Placeholders: <code>{'{{band_name}}'}</code> <code>{'{{venue_name}}'}</code> <code>{'{{contact_name}}'}</code> <code>{'{{epk_link}}'}</code> <code>{'{{demo_link}}'}</code> <code>{'{{date}}'}</code> <code>{'{{start_time}}'}</code> <code>{'{{fee}}'}</code> <code>{'{{contact_email}}'}</code> <code>{'{{contact_phone}}'}</code>
              </div>
              <div className="input-group"><label>Subject</label><input value={curTpl.subject} onChange={e => updTpl('subject', e.target.value)} /></div>
              <div className="input-group"><label>Body</label>
                <textarea className="tpl-body-textarea" value={curTpl.body} onChange={e => updTpl('body', e.target.value)} rows={10} />
              </div>
              <div style={{ display: 'flex', gap: '.5rem', justifyContent: 'flex-end' }}>
                <button className="btn btn-small" onClick={() => { const def = EMAIL_TEMPLATES_DEFAULT[tplKey]; setLocalEpk({...localEpk, templates: { ...tpls, [tplKey]: { ...def } }}); setEpkDirty(true); }}>Reset to Default</button>
                {epkDirty && <button className="btn btn-primary btn-small" onClick={() => { onSaveEpkSettings(localEpk); setEpkDirty(false); showToast('Templates saved', 'success'); }}>Save</button>}
              </div>
            </div>
          </div>
        );
      };

      return (
        <div className="modal-backdrop" onClick={onClose}>
          <div className="venue-modal" onClick={e => e.stopPropagation()}>
            <div className="panel-header" style={{ marginBottom: '.5rem' }}>
              <div className="panel-title">📍 Venues &amp; Bookings</div>
              <button className="btn btn-small" onClick={onClose}>✕ Close</button>
            </div>
            <div className="import-tabs" style={{ marginBottom: '.65rem' }}>
              <button className={`import-tab${vTab === 'venues' ? ' active' : ''}`} onClick={() => setVTab('venues')}>Venues ({venues.length})</button>
              <button className={`import-tab${vTab === 'bookings' ? ' active' : ''}`} onClick={() => setVTab('bookings')}>Bookings ({bookings.length})</button>
              <button className={`import-tab${vTab === 'settings' ? ' active' : ''}`} onClick={() => setVTab('settings')}>EPK &amp; Templates</button>
            </div>
            <div className="venue-modal-body">
              {vTab === 'venues' && renderVenuesTab()}
              {vTab === 'bookings' && renderBookingsTab()}
              {vTab === 'settings' && renderSettingsTab()}
            </div>
          </div>
        </div>
      );
    }

    function ConfirmDialog({ open, title, message, confirmLabel = 'Confirm', secondaryLabel = '', secondaryAction = null, onConfirm, onCancel }) {
      if (!open) return null;
      return (
        <div className="modal-backdrop" onClick={onCancel}>
          <div className="modal" onClick={(e) => e.stopPropagation()}>
            <h3 style={{ marginBottom: '.5rem' }}>{title}</h3>
            <p style={{ color: 'var(--text-muted)', marginBottom: '1rem' }}>{message}</p>
            <div className="toolbar" style={{ justifyContent: 'flex-end' }}>
              {secondaryAction && secondaryLabel && (
                <button className="btn" onClick={secondaryAction}>{secondaryLabel}</button>
              )}
              <button className="btn" onClick={onCancel}>Cancel</button>
              <button className="btn btn-primary" onClick={onConfirm}>{confirmLabel}</button>
            </div>
          </div>
        </div>
      );
    }

    /******************* MAIN APP *******************/
    function IDEBackground({ children }) {
      return (
        <div className="ide-background">
          <div className="ide-background__content">{children}</div>
        </div>
      );
    }

    function App() {
      const [bands, setBands] = useState([]);
      const [activeBandId, setActiveBandId] = useState(null);

      const [songs, setSongs] = useState([]);
      const [settings, setSettings] = useState({ numSets: 2, setDuration: 45, setDurations: [], allowSongReuse: false, useEnergyCurve: true, forceOpener: false, forceCloser: true, lockedOpeners: [], lockedClosers: [], useTonalGravity: false, tonalSmoothness: 70, anchorKey: '', showDetailedDiagnostics: false, energyCurveType: 'standard', energyWeight: 0.35, tonalWeight: 0.25, diversityWeight: 1.0, randomness: 50, optimizationLevel: 'standard', setTemplate: 'freeform', songAffinities: [], songAntiAffinities: [] });
      const [setlists, setSetlists] = useState([]);
      const [locked, setLocked] = useState(new Set());
      // Cross-set drag-and-drop state
      const defaultDragState = { active: false, song: null, fromSetIdx: null, fromSongIdx: null, overSetIdx: null, overSongIdx: null };
      const [dragState, setDragState] = useState(defaultDragState);
      const [originalSetlists, setOriginalSetlists] = useState(null);

      const [isReorderMode, setIsReorderMode] = useState(false);

      const [bandModal, setBandModal] = useState(false);
      const [importModal, setImportModal] = useState(false);
      const [gigModal, setGigModal] = useState(false);
      const [toast, setToast] = useState(null);
      const [storageStatus, setStorageStatus] = useState(storageHealth.level());
      const [confirmDialog, setConfirmDialog] = useState({ open: false, title: '', message: '', confirmLabel: 'Confirm', onConfirm: null });
      const [lastGenerationStats, setLastGenerationStats] = useState(null);
      const [touchDrag, setTouchDrag] = useState({ active: false, fromSetIdx: null, fromSongIdx: null });
      const [imports, setImports] = useState([]);
      const [gigs, setGigs] = useState([]);
      const [watermarkImg, setWatermarkImg] = useState(null);

      // PHASE 3A: active/cold library tab
      const [libraryTab, setLibraryTab] = useState('active');

      // Arrangement layer view mode: 'stage' (minimal) or 'advance' (full notes)
      const [viewMode, setViewMode] = useState('stage');
      // Which roles to show in Advance View (UI + exports) — default: all
      const [advanceRoleFilter, setAdvanceRoleFilter] = useState(new Set(ARR_ROLES));

      // Email / Share modal
      const [emailModal, setEmailModal] = useState({ open: false, text: '' });

      // Venue CRM & Bookings
      const [venueModal, setVenueModal] = useState(false);
      const [stageMode, setStageMode] = useState(false);
      const [venues, setVenues] = useState([]);
      const [bookings, setBookings] = useState([]);
      const [epkSettings, setEpkSettingsState] = useState(EPK_SETTINGS_DEFAULT);

      const showToast = (message, type = 'success') => setToast({ message, type });

      const promptBackupBeforeRiskyAction = (contextLabel, action) => {
        if (!FEATURE_FLAGS.phase1ReliabilityDataSafety) {
          action();
          return;
        }
        setConfirmDialog({
          open: true,
          title: 'Export backup before continuing?',
          message: `${contextLabel} can change a lot of data. Export CSV backup first?`,
          confirmLabel: 'Continue anyway',
          onConfirm: () => {
            action();
            setConfirmDialog(prev => ({ ...prev, open: false }));
          },
          secondaryAction: () => {
            exportSongs();
            showToast('Backup CSV exported. Continue when ready.', 'success');
          },
          secondaryLabel: 'Export CSV Backup'
        });
      };

      const saveSnapshot = () => {
        if (!FEATURE_FLAGS.phase1ReliabilityDataSafety || !activeBandId) return;
        const payload = {
          ts: Date.now(),
          songs,
          setlists,
          settings,
          locked: Array.from(locked)
        };
        const existing = LS.get(LS_KEYS.bandSnapshots(activeBandId)) || [];
        const next = [payload, ...existing].slice(0, 3).map((snap, idx) => ({ ...snap, id: `snapshot_${idx + 1}` }));
        LS.set(LS_KEYS.bandSnapshots(activeBandId), next);
      };

      const recoverPreviousSnapshot = () => {
        const snapshots = LS.get(LS_KEYS.bandSnapshots(activeBandId)) || [];
        if (snapshots.length < 2) return showToast('No previous snapshot found.', 'warning');
        const target = snapshots[1];
        setSongs(target.songs || []);
        setSetlists(target.setlists || []);
        setSettings(target.settings || settings);
        setLocked(new Set(target.locked || []));
        showToast(`Recovered snapshot from ${new Date(target.ts).toLocaleString()}`, 'success');
      };

      useEffect(() => {
        const onQuotaWarning = () => showToast('Local storage is full. Export CSV or remove older songs/imports to avoid data loss.', 'warning');
        const refreshStorage = () => {
          if (!FEATURE_FLAGS.phase1ReliabilityDataSafety) return;
          const next = storageHealth.level();
          setStorageStatus(next);
          if (next.level === 'critical') showToast(`Storage at ${next.percent}% — export CSV backup soon.`, 'warning');
          else if (next.level === 'warning') showToast(`Storage at ${next.percent}% — consider exporting backup.`, 'warning');
        };
        window.addEventListener('setlist:storage-quota-warning', onQuotaWarning);
        refreshStorage();
        const timer = setInterval(refreshStorage, 15000);
        return () => {
          window.removeEventListener('setlist:storage-quota-warning', onQuotaWarning);
          clearInterval(timer);
        };
      }, []);

      useEffect(() => {
        if (!FEATURE_FLAGS.phase1ReliabilityDataSafety || !activeBandId) return;
        const t = setTimeout(saveSnapshot, 1200);
        return () => clearTimeout(t);
      }, [songs, setlists, settings, locked, activeBandId]);

      const activeBand = useMemo(() => bands.find(b => b.id === activeBandId), [bands, activeBandId]);
      const touchFallbackEnabled = FEATURE_FLAGS.phase2MobileCompatibility && /iPad|iPhone|iPod/.test(navigator.userAgent || '');

      // PHASE 3A: derived active/cold
      const activeSongs = useMemo(() => songs.filter(s => (s.status || 'active') === 'active'), [songs]);
      const coldSongs = useMemo(() => songs.filter(s => (s.status || 'active') === 'cold'), [songs]);

      const activeLibraryTime = useMemo(
        () => activeSongs.reduce((sum, s) => sum + parseDuration(s.duration), 0),
        [activeSongs]
      );

      // LOAD BANDS FROM STORAGE
      useEffect(() => {
        const stored = LS.get(LS_KEYS.bands);
        if (stored && Array.isArray(stored) && stored.length > 0) {
          setBands(stored);
          const activeId = LS.get(LS_KEYS.active) || stored[0].id;
          setActiveBandId(activeId);
        } else {
          const defaultBand = {
            id: genId(),
            name: 'Default Band',
            icon: '🎵',
            color: '#ff6b35'
          };
          setBands([defaultBand]);
          setActiveBandId(defaultBand.id);
          LS.set(LS_KEYS.bands, [defaultBand]);
          LS.set(LS_KEYS.active, defaultBand.id);
        }
      }, []);

      // SAVE BANDS TO STORAGE
      useEffect(() => {
        if (bands.length > 0) LS.set(LS_KEYS.bands, bands);
      }, [bands]);

      // LOAD ACTIVE BAND DATA
      useEffect(() => {
        if (!activeBandId) return;

        const storedSongsRaw = LS.get(LS_KEYS.bandSongs(activeBandId)) || [];
        // PHASE 3A: normalize status for older data
        const normalizedSongs = storedSongsRaw.map(s => ({ ...s, status: (s.status || 'active') }));

        const storedSettings = LS.get(LS_KEYS.bandSettings(activeBandId)) || { numSets: 2, setDuration: 45, setDurations: [], allowSongReuse: false, useEnergyCurve: true, forceOpener: false, forceCloser: true, lockedOpeners: [], lockedClosers: [], useTonalGravity: false, tonalSmoothness: 70, anchorKey: '', showDetailedDiagnostics: false, energyCurveType: 'standard', energyWeight: 0.35, tonalWeight: 0.25, diversityWeight: 1.0, randomness: 50, optimizationLevel: 'standard', setTemplate: 'freeform', songAffinities: [], songAntiAffinities: [] };
        // Ensure backward compatibility for settings without newer fields
        if (!storedSettings.lockedOpeners) storedSettings.lockedOpeners = [];
        if (!storedSettings.lockedClosers) storedSettings.lockedClosers = [];
        if (!storedSettings.energyCurveType) storedSettings.energyCurveType = 'standard';
        if (storedSettings.energyWeight == null) storedSettings.energyWeight = 0.35;
        if (storedSettings.tonalWeight == null) storedSettings.tonalWeight = 0.25;
        if (storedSettings.diversityWeight == null) storedSettings.diversityWeight = 1.0;
        if (storedSettings.randomness == null) storedSettings.randomness = 50;
        if (!storedSettings.optimizationLevel) storedSettings.optimizationLevel = 'standard';
        if (!storedSettings.setTemplate) storedSettings.setTemplate = 'freeform';
        if (!storedSettings.songAffinities) storedSettings.songAffinities = [];
        if (!storedSettings.songAntiAffinities) storedSettings.songAntiAffinities = [];
        // Backward-compat for song-to-set pinning (new in this version)
        if (!storedSettings.songSetPins) storedSettings.songSetPins = [];
        const storedImports = LS.get(LS_KEYS.bandImports(activeBandId)) || [];
        const storedGigs = LS.get(LS_KEYS.bandGigs(activeBandId)) || [];
        const storedWatermark = LS.get(LS_KEYS.bandWatermark(activeBandId)) || null;
        const storedVenues = LS.get(LS_KEYS.bandVenues(activeBandId)) || [];
        const storedBookings = LS.get(LS_KEYS.bandBookings(activeBandId)) || [];

        setSongs(normalizedSongs);
        setSettings(storedSettings);
        setImports(storedImports);
        setGigs(storedGigs);
        setWatermarkImg(storedWatermark);
        setVenues(storedVenues);
        setBookings(storedBookings);

        setSetlists([]);
        setLocked(new Set());
        setLibraryTab('active');
      }, [activeBandId]);

      // Load global EPK settings on mount (not per-band)
      useEffect(() => {
        const stored = LS.get(LS_KEYS.epkSettings);
        if (stored) {
          setEpkSettingsState({
            ...EPK_SETTINGS_DEFAULT, ...stored,
            templates: { ...EMAIL_TEMPLATES_DEFAULT, ...(stored.templates || {}) }
          });
        }
      }, []);

      // SAVE ACTIVE BAND DATA
      useEffect(() => {
        if (activeBandId) LS.set(LS_KEYS.bandSongs(activeBandId), songs);
      }, [songs, activeBandId]);

      useEffect(() => {
        if (activeBandId) LS.set(LS_KEYS.bandSettings(activeBandId), settings);
      }, [settings, activeBandId]);

      useEffect(() => {
        if (activeBandId) LS.set(LS_KEYS.bandVenues(activeBandId), venues);
      }, [venues, activeBandId]);

      useEffect(() => {
        if (activeBandId) LS.set(LS_KEYS.bandBookings(activeBandId), bookings);
      }, [bookings, activeBandId]);

      // Venue & Booking CRUD
      const addVenue = (form) => { setVenues(prev => [...prev, { ...form, id: genId(), createdAt: Date.now() }]); showToast('Venue added', 'success'); };
      const updateVenue = (v) => { setVenues(prev => prev.map(x => x.id === v.id ? v : x)); };
      const deleteVenue = (id) => { setVenues(prev => prev.filter(x => x.id !== id)); showToast('Venue removed', 'success'); };
      const bulkAddVenues = (newVenues) => {
        const currentNames = new Set(venues.map(v => v.name.trim().toLowerCase()));
        const toAdd = []; let skipped = 0;
        newVenues.forEach(v => {
          const key = (v.name || '').trim().toLowerCase();
          if (!key || currentNames.has(key)) { skipped++; return; }
          currentNames.add(key);
          toAdd.push({ ...BLANK_VENUE, ...v, id: genId(), createdAt: Date.now() });
        });
        if (toAdd.length) setVenues(prev => [...prev, ...toAdd]);
        const msg = toAdd.length
          ? `Added ${toAdd.length} venue${toAdd.length !== 1 ? 's' : ''}${skipped ? `, skipped ${skipped} duplicate${skipped !== 1 ? 's' : ''}` : ''}`
          : `No new venues — ${skipped} duplicate${skipped !== 1 ? 's' : ''} skipped`;
        showToast(msg, toAdd.length ? 'success' : 'warning');
      };
      const addBooking = (form) => { setBookings(prev => [...prev, { ...form, id: genId(), createdAt: Date.now() }]); showToast('Booking added', 'success'); };
      const updateBooking = (b) => { setBookings(prev => prev.map(x => x.id === b.id ? b : x)); showToast('Booking updated', 'success'); };
      const deleteBooking = (id) => { setBookings(prev => prev.filter(x => x.id !== id)); showToast('Booking removed', 'success'); };
      const saveEpkSettings = (s) => { setEpkSettingsState(s); LS.set(LS_KEYS.epkSettings, s); };

      // PHASE 2: Build lock plan from current setlists
      const buildLockPlanFromCurrentSetlists = () => {
        if (!setlists || setlists.length === 0 || locked.size === 0) return null;

        const plan = [];
        for (let setIdx = 0; setIdx < setlists.length; setIdx++) {
          const set = setlists[setIdx];
          if (!set) { plan.push([]); continue; }

          const lockedEntries = [];
          set.songs.forEach((song, idx) => {
            if (song && locked.has(`${setIdx}:${song.id}`)) {
              lockedEntries.push({ index: idx, song });
            }
          });
          plan.push(lockedEntries);
        }
        return plan;
      };

      const generate = () => {
        // PHASE 3A: generator uses ACTIVE only
        const lockPlan = buildLockPlanFromCurrentSetlists();
        const generatorFn = settings.useTonalGravity ? generateSetlistsCore_WithTonalGravity : generateSetlistsCore;
        // Pre-compute anchor key so the core generator can use it for tonal-aware selection
        let _anchorKey = null;
        if (settings.useTonalGravity) {
          const enrichedForAnchor = activeSongs.map(s => ({
            ...s,
            normalizedKey: normalizeKey_TG(s.key, s.tags || [])
          }));
          _anchorKey = determineAnchorKey_TG(enrichedForAnchor, settings.anchorKey || '');
        }
        const out = generatorFn(activeSongs, {
          ...settings,
          lockPlan: lockPlan || null,
          _anchorKey
        });
        // Compute quality scores if not already attached (non-tonal-gravity path)
        if (!out.qualityScores) {
          try {
            out.qualityScores = out.map((set, si) => {
              const dur = (settings.setDurations && settings.setDurations[si] > 0)
                ? settings.setDurations[si]
                : (settings.setDuration || 45);
              return calculateSetlistQualityScore(set, { ...settings, setDuration: dur, _anchorKey });
            });
          } catch (e) { console.warn('Quality score computation failed:', e); }
        }

        // Smart arrangement notes injection — tag opener/closer songs per set
        if (settings.forceOpener || settings.forceCloser) {
          out.forEach(set => {
            if (!set.songs || set.songs.length === 0) return;
            if (settings.forceOpener) {
              const first = set.songs[0];
              const arr = parseArrangement(first.arrangement);
              if (!arr.global.includes('[OPENER]')) {
                arr.global = `[OPENER] Establish groove before vocal. ${arr.global}`.trim();
                set.songs[0] = { ...first, arrangement: serializeArrangement(arr) };
              }
            }
            if (settings.forceCloser) {
              const lastIdx = set.songs.length - 1;
              const last = set.songs[lastIdx];
              const arr = parseArrangement(last.arrangement);
              if (!arr.global.includes('[CLOSER]')) {
                arr.global = `${arr.global}\n[CLOSER] Extended vamp – end on visual cue.`.trim();
                set.songs[lastIdx] = { ...last, arrangement: serializeArrangement(arr) };
              }
            }
          });
        }

        setSetlists(out);
        setLastGenerationStats(out.stats);

        const history = LS.get(LS_KEYS.bandHistory(activeBandId)) || [];
        const newEntry = { ts: Date.now(), settings, setlists: out };
        LS.set(LS_KEYS.bandHistory(activeBandId), [newEntry, ...history].slice(0, 50));

        if (out.generationWarnings && out.generationWarnings.length) {
          showToast(out.generationWarnings[0], 'warning');
        } else {
          showToast(`Generated ${settings.numSets} set(s)`, 'success');
        }
      };

      const addSong = (songData) => {
        const newSong = { id: genId(), status: 'active', ...songData };
        setSongs([...songs, newSong]);
        showToast('Song added (Active)', 'success');
      };

      const updateSong = (id, updates) => {
        setSongs(songs.map(s => s.id === id ? { ...s, ...updates } : s));
        showToast('Song updated', 'success');
      };

      const deleteSong = (id) => {
        setConfirmDialog({
          open: true,
          title: 'Delete song?',
          message: 'This removes the song from your library.',
          confirmLabel: 'Delete song',
          onConfirm: () => {
            setSongs(songs.filter(s => s.id !== id));
            showToast('Song deleted', 'warning');
            setConfirmDialog(prev => ({ ...prev, open: false }));
          }
        });
      };

      // PHASE 3A: shelf/restore
      const shelfSong = (id) => {
        setSongs(songs.map(s => s.id === id ? { ...s, status: 'cold' } : s));
        // remove from setlists + locks if it appears (optional safety)
        setLocked(prev => {
          const next = new Set(prev);
          [...next].forEach(k => {
            const [, songId] = k.split(':');
            if (songId === id) next.delete(k);
          });
          return next;
        });
        showToast('Shelved to Cold List', 'success');
      };

      const restoreSong = (id) => {
        setSongs(songs.map(s => s.id === id ? { ...s, status: 'active' } : s));
        showToast('Restored to Active', 'success');
      };

      const clearAllSongs = () => {
        const doClear = () => setConfirmDialog({
          open: true,
          title: 'Delete all songs?',
          message: 'This cannot be undone.',
          confirmLabel: 'Delete all',
          onConfirm: () => {
            setSongs([]);
            setSetlists([]);
            setLocked(new Set());
            setLastGenerationStats(null);
            showToast('All songs deleted', 'warning');
            setConfirmDialog(prev => ({ ...prev, open: false }));
          }
        });
        promptBackupBeforeRiskyAction('Clearing all songs', doClear);
      };

      // PHASE 2: CSV Export with proper quoting + enhanced energy/tonal data
      const exportSongs = () => {
        const headers = ['Title', 'Artist', 'Duration', 'Style', 'Key', 'BPM', 'Vocalist', 'Energy', 'Status', 'Arr General', 'Arr Drums', 'Arr Keys', 'Arr Bass', 'Arr Guitar2', 'Arr Ending Cue'];
        const rows = songs.map(s => {
          const energy = getCompositeEnergy(s);
          const arr = parseArrangement(s.arrangement || '');
          return [
            csvSafeCell(s.title),
            csvSafeCell(s.artist),
            csvSafeCell(s.duration ?? ''),
            csvSafeCell(s.style ?? ''),
            csvSafeCell(s.key ?? ''),
            csvSafeCell(s.bpm ?? ''),
            csvSafeCell(s.vocalist ?? ''),
            csvSafeCell(Math.round(energy * 10) / 10),
            csvSafeCell(s.status || 'active'),
            csvSafeCell(arr.global),
            csvSafeCell(arr.drums),
            csvSafeCell(arr.keys),
            csvSafeCell(arr.bass),
            csvSafeCell(arr.guitar2),
            csvSafeCell(arr.endingCue)
          ];
        });
        if (!validateCSVRows(rows)) {
          showToast('CSV export blocked: invalid control characters detected.', 'error');
          return;
        }
        const csv = [headers.map(csvSafeCell).join(','), ...rows.map(r => r.join(','))].join('\n');
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `songs-${activeBand?.name || 'band'}-${new Date().toISOString().slice(0, 10)}.csv`;
        a.click();
        setTimeout(() => URL.revokeObjectURL(url), 3000);
      };

      // ─── SHARED FUZZY TITLE DEDUP ENGINE ────────────────────────────────────
      // Used by both importCSVRobust (Quick Import) and importCanonicalRows
      // (Import + Normalize). Dedup is title-column only — artist and all other
      // fields are ignored.
      //
      // Strategy (applied in order):
      //   1. Exact match after normalization (fast path)
      //   2. Word-set containment: every word in the SHORTER title fuzzy-matches
      //      a unique word in the LONGER title (catches "Shot the Sheriff" inside
      //      "I Shot the Sheriff", or "Dock of the Bay" inside
      //      "Sitting on the Dock of the Bay")
      //   3. Per-word fuzzy matching via Levenshtein edit distance catches
      //      spelling variants: "Ramblin'" ≈ "Rambling", "goode" ≈ "good"

      // Step 1 – normalize a raw title string.
      const normTitle = (s) => (s || '').toLowerCase()
        .replace(/['''\u2018\u2019"`]/g, '') // strip all quote variants
        .replace(/[^a-z0-9\s]/g, ' ')        // remaining punctuation → space
        .replace(/\b(the|a|an|of|on|in|at|to|for|and|or|but)\b/g, '') // stopwords
        .replace(/\s+/g, ' ')
        .trim();

      // Step 2 – character-level edit distance (two-row DP, O(m*n) time).
      const levenshtein = (a, b) => {
        if (a === b) return 0;
        if (!a.length) return b.length;
        if (!b.length) return a.length;
        let prev = Array.from({ length: b.length + 1 }, (_, i) => i);
        let curr = new Array(b.length + 1);
        for (let i = 1; i <= a.length; i++) {
          curr[0] = i;
          for (let j = 1; j <= b.length; j++) {
            curr[j] = a[i - 1] === b[j - 1]
              ? prev[j - 1]
              : 1 + Math.min(prev[j - 1], prev[j], curr[j - 1]);
          }
          [prev, curr] = [curr, prev];
        }
        return prev[b.length];
      };

      // Step 3 – do two words count as the same?
      //   • exact match always passes
      //   • very short words (< 4 chars): exact only — prevents "of"≈"on" false hits
      //   • 4–5 char words: allow 1 edit ("goode"→"good", "dock"→"rock" wouldn't hit)
      //   • 6+ char words: allow 2 edits ("ramblin"→"rambling", "sittin"→"sitting")
      const wordsSame = (a, b) => {
        if (a === b) return true;
        const minLen = Math.min(a.length, b.length);
        if (minLen < 4) return false;
        return levenshtein(a, b) <= (minLen >= 6 ? 2 : 1);
      };

      // Step 4 – do two normalized title strings represent the same song?
      const titlesSame = (na, nb) => {
        if (!na && !nb) return true;
        if (!na || !nb) return false;
        if (na === nb) return true;

        const wa = na.split(' ').filter(Boolean);
        const wb = nb.split(' ').filter(Boolean);
        const [shorter, longer] = wa.length <= wb.length ? [wa, wb] : [wb, wa];

        // Single-word titles must match exactly (no containment — avoids
        // "Thunder" swallowing "Thunder Road" or "Thunder Struck").
        if (shorter.length < 2) return false;

        // Coverage guard: shorter title must be ≥ 40% the length of longer title.
        // Stops a 2-word title from falsely matching a 10-word title by coincidence.
        if (shorter.length / longer.length < 0.40) return false;

        // Every word in the shorter title must fuzzy-match a unique word in the longer.
        const used = new Set();
        for (const sw of shorter) {
          let found = false;
          for (let i = 0; i < longer.length; i++) {
            if (!used.has(i) && wordsSame(sw, longer[i])) {
              used.add(i);
              found = true;
              break;
            }
          }
          if (!found) return false;
        }
        return true;
      };

      // Step 5 – check one incoming title against a pre-built list of existing
      // normalized titles. Returns true when a match is found.
      const isTitleDupe = (rawTitle, existingNorms) => {
        const n = normTitle(rawTitle);
        return existingNorms.some(en => titlesSame(n, en));
      };
      // ─── END FUZZY TITLE DEDUP ENGINE ───────────────────────────────────────

      const importCSVRobust = async (e) => {
        const files = Array.from(e.target.files || []);
        if (files.length === 0) return;

        // Seed the dedup list from the existing library (title-only, fuzzy).
        // Uses the shared titlesSame / isTitleDupe engine defined above.
        const existingNorms = songs.map(s => normTitle(s.title));

        // Collect all parsed songs across all files, scrubbing duplicates as we go.
        const allImported = [];
        let crossFileDupes = 0;
        let crossLibraryDupes = 0;
        const fileNames = [];
        let pdfErrors = 0;

        // Parse a single CSV/TXT text blob and return song objects.
        const parseCSVText = (text) => {
          const result = Papa.parse(String(text), {
            header: true, skipEmptyLines: 'greedy', dynamicTyping: false
          });
          if (!result.data || result.data.length === 0) return [];
          const out = [];
          for (const row of result.data) {
            const get = (keys) => {
              for (const k of keys) {
                for (const col of Object.keys(row)) {
                  if (col.toLowerCase().trim() === k) return (row[col] || '').trim();
                }
              }
              return '';
            };
            const title = get(['title', 'song', 'song title', 'name', 'tune', 'track']);
            const artist = get(['artist', 'band', 'performer', 'by']);
            const duration = get(['duration', 'dur', 'time', 'length', 'minutes']);
            if (!title || !artist || !duration) continue;
            out.push({
              title: sanitizeInput(title),
              artist: sanitizeInput(artist),
              duration: parseDuration(duration),
              style: (get(['style', 'genre', 'type', 'feel']) || 'midtempo').toLowerCase(),
              key: get(['key', 'tonality', 'pitch']) || '',
              bpm: get(['bpm', 'tempo', 'speed']) || '',
              vocalist: get(['vocalist', 'singer', 'lead', 'vox', 'vocal']) || '',
              arrangement: get(['arrangement', 'arr', 'notes', 'cues']) || ''
            });
          }
          return out;
        };

        // Process files sequentially; PDFs use the async path, CSVs use FileReader.
        for (const file of files) {
          fileNames.push(file.name);
          let parsedSongs = [];

          if (file.name.toLowerCase().endsWith('.pdf') || file.type === 'application/pdf') {
            try {
              const arrayBuffer = await file.arrayBuffer();
              const pageTexts = await pdfExtractText(arrayBuffer);
              const pdfSongs = pdfParseAllPages(pageTexts);
              parsedSongs = pdfSongs.map(s => {
                const rawStyle = s.style ? s.style.toLowerCase() : '';
                const knownStyle = (rawStyle && PDF_KNOWN_STYLES.has(rawStyle)) ? rawStyle : '';
                let inferredFlag = false;
                let resolvedStyle = knownStyle;
                if (!resolvedStyle) {
                  const inf = inferStyleFromArtistBpm(s.artist, s.bpm);
                  if (inf) { resolvedStyle = inf.style; inferredFlag = true; }
                  else resolvedStyle = 'midtempo';
                }
                return {
                  title: sanitizeInput(s.title),
                  artist: sanitizeInput(s.artist),
                  duration: parseDuration(s.duration),
                  style: resolvedStyle,
                  key: s.key || '',
                  bpm: s.bpm || '',
                  vocalist: s.vocalist || '',
                  ...(inferredFlag ? { styleInferred: true } : {})
                };
              });
            } catch (err) {
              console.error('PDF parse error:', err);
              pdfErrors++;
              continue;
            }
          } else {
            // CSV / TXT — read synchronously via FileReader wrapped in a Promise.
            parsedSongs = await new Promise((resolve) => {
              const reader = new FileReader();
              reader.onload = (ev) => resolve(parseCSVText(ev.target?.result || ''));
              reader.onerror = () => resolve([]);
              reader.readAsText(file);
            });
          }

          // Scrub each song against the existing library AND songs already collected
          // from earlier files in this batch (cross-file dedup).
          for (const song of parsedSongs) {
            if (isTitleDupe(song.title, existingNorms)) {
              crossLibraryDupes++;
            } else {
              // Register normalized form so later files in this batch are compared against it.
              existingNorms.push(normTitle(song.title));
              allImported.push({ id: genId(), status: 'active', ...song });
            }
          }
        }

        // Cross-file dupes are already counted in crossLibraryDupes above (second file
        // that introduces a song already seen in file 1 hits the existingKeys guard).
        // Split the counts for the user-facing message.
        const totalDupes = crossLibraryDupes;
        if (allImported.length === 0 && totalDupes === 0 && pdfErrors === 0) {
          e.target.value = '';
          return showToast('No valid songs found in selected file(s)', 'error');
        }

        const label = files.length > 1
          ? `${files.length} files (${fileNames.join(', ').slice(0, 60)}${fileNames.join(', ').length > 60 ? '…' : ''})`
          : fileNames[0];

        const commitImport = () => {
          if (allImported.length > 0) setSongs(prev => [...prev, ...allImported]);
          const newImport = {
            ts: Date.now(),
            count: allImported.length,
            filename: label,
            dupes: totalDupes
          };
          const updatedImports = [newImport, ...imports].slice(0, 10);
          setImports(updatedImports);
          LS.set(LS_KEYS.bandImports(activeBandId), updatedImports);

          let msg = `Imported ${allImported.length} song${allImported.length !== 1 ? 's' : ''}`;
          if (files.length > 1) msg += ` from ${files.length} files`;
          if (totalDupes > 0) msg += ` — ${totalDupes} duplicate${totalDupes !== 1 ? 's' : ''} removed`;
          if (pdfErrors > 0) msg += ` — ${pdfErrors} PDF failed`;
          showToast(msg, allImported.length > 0 ? 'success' : 'warning');
        };

        if (allImported.length >= 25) promptBackupBeforeRiskyAction(`Bulk import (${allImported.length} songs)`, commitImport);
        else commitImport();

        e.target.value = '';
      };

      const downloadSampleCSV = () => {

      // Canonical import with dedup
      const importCanonicalRows = (rows, report) => {
        // Uses the shared fuzzy engine (normTitle / titlesSame / isTitleDupe).
        const existingNormsCanon = songs.map(s => normTitle(s.title));
        const imported = [];
        let dupeCount = 0;

        for (const row of rows) {
          const dedupKey = normTitle(row.title);
          if (isTitleDupe(row.title, existingNormsCanon)) {
            // Merge missing fields into the existing matching song.
            const idx = songs.findIndex(s => titlesSame(normTitle(s.title), dedupKey));
            if (idx >= 0) {
              const existing = songs[idx];
              let updated = false;
              const merged = { ...existing };
              if (!merged.key && row.key) { merged.key = row.key; updated = true; }
              if (!merged.bpm && row.tempo) { merged.bpm = row.tempo; updated = true; }
              if (!merged.artist && row.artist) { merged.artist = sanitizeInput(row.artist); updated = true; }
              if ((!merged.duration || merged.duration === DEFAULT_DURATION_MINUTES) && row.duration) { merged.duration = parseDuration(row.duration); updated = true; }
              if (merged.style === 'midtempo' && row.style && row.style !== 'midtempo') { merged.style = row.style; updated = true; }
              if (!merged.arrangement && row.arrangement) { merged.arrangement = row.arrangement; updated = true; }
              if (updated) {
                const newSongs = [...songs];
                newSongs[idx] = merged;
                setSongs(newSongs);
              }
            }
            dupeCount++;
            continue;
          }

          existingNormsCanon.push(dedupKey);
          imported.push({
            id: genId(),
            status: 'active',
            title: sanitizeInput(row.title),
            artist: sanitizeInput(row.artist || ''),
            duration: parseDuration(row.duration || 0),
            style: row.style || 'midtempo',
            key: row.key || '',
            bpm: row.tempo || '',
            vocalist: row.vocalist || '',
            arrangement: row.arrangement || ''
          });
        }

        const commitImport = () => {
          if (imported.length > 0) {
            setSongs(prev => [...prev, ...imported]);
          }

          const newImport = { ts: Date.now(), count: imported.length, filename: 'canonical-import', dupes: dupeCount };
          const updatedImports = [newImport, ...imports].slice(0, 10);
          setImports(updatedImports);
          LS.set(LS_KEYS.bandImports(activeBandId), updatedImports);

          let msg = `Imported ${imported.length} songs`;
          if (dupeCount > 0) msg += ` (${dupeCount} duplicates merged/skipped)`;
          msg += ` | Parsed: ${report.rowsParsed}, Rejected: ${report.rowsRejected}`;
          showToast(msg, 'success');
        };

        if (report.rowsParsed >= 25) promptBackupBeforeRiskyAction('Bulk normalized import', commitImport);
        else commitImport();
      };

      const copyToClipboard = () => {
        const text = setlists.map((set) => {
          const header = `${set.name} (${set.songs.length} songs, ${Math.round(set.totalTime)} min)\n${'='.repeat(50)}`;
          const songList = set.songs.map((s, idx) => {
            const meta = [];
            if (s.key) meta.push(s.key);
            if (s.bpm) meta.push(`${s.bpm} BPM`);
            const metaStr = meta.length > 0 ? ` (${meta.join(' | ')})` : '';
            let line = `${idx + 1}. ${s.title}${s.artist ? ` - ${s.artist}` : ''}${metaStr}`;
            if (viewMode === 'advance' && hasArrangementData(s.arrangement)) {
              const arr = parseArrangement(s.arrangement);
              const rf = advanceRoleFilter || new Set(ARR_ROLES);
              ARR_ROLES.filter(r => arr[r] && rf.has(r)).forEach(r => {
                line += `\n   [${ARR_ROLE_LABELS[r].toUpperCase()}] ${arr[r]}`;
              });
            }
            return line;
          }).join('\n');
          return `${header}\n${songList}`;
        }).join('\n\n');

        navigator.clipboard.writeText(text).then(() => showToast('Copied to clipboard', 'success'));
      };

      const openEmailShare = () => {
        if (!setlists.length) return;
        const isAdvance = viewMode === 'advance';
        const bandName = activeBand?.name || 'Band';
        const date = new Date().toLocaleDateString(undefined, { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });
        const divider = '─'.repeat(48);
        const heavyDiv = '═'.repeat(48);

        const lines = [];
        lines.push(`${bandName} — Setlist`);
        lines.push(date);
        lines.push(isAdvance ? 'View: Advance (arrangement notes included)' : 'View: Stage');
        lines.push('');

        setlists.forEach((set, si) => {
          lines.push(heavyDiv);
          lines.push(`${(set.name || `Set ${si + 1}`).toUpperCase()}  ·  ${set.songs.length} songs  ·  ~${Math.round(set.totalTime)} min`);
          lines.push(heavyDiv);
          lines.push('');

          set.songs.forEach((s, idx) => {
            const meta = [s.key, s.bpm ? `${s.bpm} BPM` : '', s.style].filter(Boolean).join('  |  ');
            lines.push(`${String(idx + 1).padStart(2, ' ')}.  ${(s.title || '').toUpperCase()}${s.artist ? `  —  ${s.artist}` : ''}`);
            if (meta) lines.push(`      ${meta}`);
            if (isAdvance && hasArrangementData(s.arrangement)) {
              const arr = parseArrangement(s.arrangement);
              const rf = advanceRoleFilter || new Set(ARR_ROLES);
              ARR_ROLES.filter(r => arr[r] && rf.has(r)).forEach(role => {
                const label = ARR_ROLE_LABELS[role].toUpperCase().padEnd(10);
                arr[role].split('\n').forEach((line, i) => {
                  lines.push(i === 0 ? `      ${label} ${line}` : `                   ${line}`);
                });
              });
            }
            lines.push('');
          });

          // Total time footer
          lines.push(divider);
          lines.push(`Total: ${set.songs.length} songs  ·  ${Math.round(set.totalTime)} min`);
          lines.push('');
          if (si < setlists.length - 1) lines.push('');
        });

        setEmailModal({ open: true, text: lines.join('\n') });
      };

      const handleWatermarkUpload = (e) => {
