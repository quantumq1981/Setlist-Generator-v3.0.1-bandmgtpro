      const exportPDF = () => {
        const isAdvance = viewMode === 'advance';
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ orientation: 'portrait', unit: 'pt', format: 'letter' });
        const pageW = doc.internal.pageSize.getWidth();   // 612pt
        const pageH = doc.internal.pageSize.getHeight();  // 792pt
        const margin = 36;
        const tableX = margin;
        const tableW = pageW - margin * 2;                // 540pt

        // Column layout — style column widened for compound genres (southern rock, jazz rock, etc.)
        const cols = {
          title:  { x: tableX,                   w: tableW * 0.36 }, // Song Title ~36%
          artist: { x: tableX + tableW * 0.36,   w: tableW * 0.20 }, // Artist ~20%
          key:    { x: tableX + tableW * 0.56,   w: tableW * 0.11 }, // Key ~11%
          bpm:    { x: tableX + tableW * 0.67,   w: tableW * 0.10 }, // BPM ~10%
          style:  { x: tableX + tableW * 0.77,   w: tableW * 0.23 }, // Style ~23%
        };
        const ROW_H = 44;
        const HEADER_ROW_H = 38;
        const CELL_PAD = 10;
        const TITLE_SIZE = 28;
        const HEADER_FONT = 13;
        const BODY_FONT = 14;

        // Palette (light background with faded watermark)
        const HDR_R = 61, HDR_G = 79, HDR_B = 95;
        const ALT_ROW = [245, 245, 245];
        const LINE_C = [220, 220, 220];
        const TEXT_C = [30, 30, 30];

        const addWatermark = () => {
          if (!watermarkImg) return;
          doc.saveGraphicsState();
          doc.setGState(new doc.GState({ opacity: 0.12 }));
          try {
            doc.addImage(watermarkImg, 'AUTO', 0, 0, pageW, pageH);
          } catch (err) {
            console.warn('Watermark image error:', err);
          }
          doc.restoreGraphicsState();
        };

        const truncate = (text, maxWidth) => {
          if (doc.getTextWidth(text) <= maxWidth) return text;
          while (doc.getTextWidth(text + '…') > maxWidth && text.length > 0) {
            text = text.slice(0, -1);
          }
          return text + '…';
        };

        // Draw the dark header row for the table
        const drawTableHeader = (y) => {
          doc.setFillColor(HDR_R, HDR_G, HDR_B);
          doc.rect(tableX, y, tableW, HEADER_ROW_H, 'F');

          doc.setFont('helvetica', 'bold');
          doc.setFontSize(HEADER_FONT);
          doc.setTextColor(255, 255, 255);
          const textY = y + HEADER_ROW_H / 2 + 4;
          doc.text('SONG TITLE', cols.title.x + CELL_PAD, textY);
          doc.text('ARTIST', cols.artist.x + CELL_PAD, textY);
          doc.text('KEY', cols.key.x + cols.key.w / 2, textY, { align: 'center' });
          doc.text('BPM', cols.bpm.x + cols.bpm.w / 2, textY, { align: 'center' });
          doc.text('STYLE', cols.style.x + CELL_PAD, textY);

          return y + HEADER_ROW_H;
        };

        // Draw one song row (alternating dark background)
        const drawSongRow = (song, y, rowIdx) => {
          if (rowIdx % 2 === 1) {
            doc.setFillColor(...ALT_ROW);
            doc.rect(tableX, y, tableW, ROW_H, 'F');
          }

          doc.setDrawColor(...LINE_C);
          doc.setLineWidth(0.5);
          doc.line(tableX, y, tableX + tableW, y);

          doc.setFont('helvetica', 'bold');
          doc.setFontSize(BODY_FONT);
          doc.setTextColor(...TEXT_C);
          const textY = y + ROW_H / 2 + BODY_FONT * 0.35;

          // Song Title — all-caps with ellipsis on overflow
          doc.text(
            truncate((song.title || '').toUpperCase(), cols.title.w - CELL_PAD * 2),
            cols.title.x + CELL_PAD, textY
          );

          // Artist — mixed case, smaller feel via same font
          doc.text(
            truncate(song.artist || '', cols.artist.w - CELL_PAD * 2),
            cols.artist.x + CELL_PAD, textY
          );

          if (song.key) {
            doc.text(String(song.key), cols.key.x + cols.key.w / 2, textY, { align: 'center' });
          }

          if (song.bpm) {
            doc.text(String(song.bpm), cols.bpm.x + cols.bpm.w / 2, textY, { align: 'center' });
          }

          if (song.style) {
            doc.text(
              truncate(song.style, cols.style.w - CELL_PAD * 2),
              cols.style.x + CELL_PAD, textY
            );
          }

          return y + ROW_H;
        };

        // Draw vertical column dividers for the visible table area
        const drawColumnLines = (startY, endY) => {
          doc.setDrawColor(...LINE_C);
          doc.setLineWidth(0.5);
          doc.rect(tableX, startY, tableW, endY - startY);
          [cols.artist.x, cols.key.x, cols.bpm.x, cols.style.x].forEach(x => {
            doc.line(x, startY, x, endY);
          });
        };

        // --- Render each set ---
        setlists.forEach((set, setIdx) => {
          if (setIdx > 0) doc.addPage();
          addWatermark();

          // Set title centred at top
          let yPos = margin + TITLE_SIZE;
          doc.setFont('helvetica', 'bold');
          doc.setFontSize(TITLE_SIZE);
          doc.setTextColor(0, 0, 0);
          const setTitle = (set.name || `Set ${setIdx + 1}`).toUpperCase();
          doc.text(setTitle, pageW / 2, yPos, { align: 'center' });
          yPos += TITLE_SIZE + 12;

          // Table header
          let pageTableTop = yPos;
          yPos = drawTableHeader(yPos);

          // Song rows
          let rowCounter = 0;
          const ARR_FONT = 9;
          const ARR_VPAD = 6;
          set.songs.forEach((song) => {
            // Estimate arrangement block height for advance view
            let arrLines = [];
            let arrBlockH = 0;
            if (isAdvance && hasArrangementData(song.arrangement)) {
              const arrParsed = parseArrangement(song.arrangement);
              const rf = advanceRoleFilter || new Set(ARR_ROLES);
              const roleTexts = ARR_ROLES.filter(r => arrParsed[r] && rf.has(r))
                .map(r => `${ARR_ROLE_LABELS[r].toUpperCase()}: ${arrParsed[r]}`);
              const fullText = roleTexts.join('\n');
              doc.setFontSize(ARR_FONT);
              arrLines = doc.splitTextToSize(fullText, tableW - CELL_PAD * 2);
              arrBlockH = arrLines.length * (ARR_FONT + 3) + ARR_VPAD * 2 + 4;
            }

            // Page break check
            if (yPos + ROW_H + arrBlockH > pageH - margin) {
              drawColumnLines(pageTableTop, yPos);
              doc.addPage();
              addWatermark();
              pageTableTop = margin + 10;
              yPos = pageTableTop;
              yPos = drawTableHeader(yPos);
              rowCounter = 0;
            }

            yPos = drawSongRow(song, yPos, rowCounter);

            // Advance view: render per-role arrangement notes beneath the song row
            if (isAdvance && arrLines.length > 0) {
              const blockY = yPos;
              doc.setFillColor(245, 250, 245);
              doc.rect(tableX, blockY, tableW, arrBlockH, 'F');
              doc.setDrawColor(180, 210, 180);
              doc.setLineWidth(0.5);
              doc.rect(tableX, blockY, tableW, arrBlockH);
              doc.setFont('helvetica', 'bold');
              doc.setFontSize(7);
              doc.setTextColor(60, 140, 60);
              doc.text('ARRANGEMENT', tableX + CELL_PAD, blockY + ARR_VPAD + 7);
              doc.setFont('helvetica', 'normal');
              doc.setFontSize(ARR_FONT);
              doc.setTextColor(50, 50, 50);
              let lineY = blockY + ARR_VPAD + 7 + (ARR_FONT + 1);
              arrLines.forEach(line => {
                doc.text(line, tableX + CELL_PAD, lineY);
                lineY += ARR_FONT + 3;
              });
              yPos += arrBlockH;
            }

            rowCounter++;
          });

          drawColumnLines(pageTableTop, yPos);
        });

        // --- Summary page ---
        if (setlists.length > 0) {
          doc.addPage();
          addWatermark();
          let yPos = margin + 10;

          doc.setFont('helvetica', 'bold');
          doc.setFontSize(TITLE_SIZE);
          doc.setTextColor(0, 0, 0);
          doc.text('SETLIST SUMMARY', pageW / 2, yPos, { align: 'center' });
          yPos += TITLE_SIZE + 20;

          doc.setFont('helvetica', 'normal');
          doc.setFontSize(12);
          doc.text(`Band: ${activeBand?.name || 'Unknown'}`, margin, yPos);
          yPos += 20;
          doc.text(`Generated: ${new Date().toLocaleDateString()} ${new Date().toLocaleTimeString()}`, margin, yPos);
          yPos += 20;
          doc.text(`Total Sets: ${setlists.length}`, margin, yPos);
          yPos += 20;
          const totalSongs = setlists.reduce((s, set) => s + set.songs.length, 0);
          const totalTime = setlists.reduce((s, set) => s + set.totalTime, 0);
          doc.text(`Total Songs: ${totalSongs}  |  Total Time: ${Math.round(totalTime)} minutes`, margin, yPos);
          yPos += 20;
          doc.text(`View: ${isAdvance ? 'Advance / Hired Gun (arrangement notes included)' : 'Stage View (minimal)'}`, margin, yPos);
          yPos += 34;

          // Per-set quality breakdown
          const qScores = setlists.qualityScores;
          if (qScores && qScores.length > 0) {
            doc.setFont('helvetica', 'bold');
            doc.setFontSize(14);
            doc.text('Quality Scores', margin, yPos);
            yPos += 22;

            doc.setFont('helvetica', 'normal');
            doc.setFontSize(11);
            qScores.forEach((q, qi) => {
              const color = q.overall >= 75 ? [0, 128, 0] : q.overall >= 50 ? [120, 100, 0] : [180, 0, 0];
              doc.setTextColor(...color);
              doc.text(`Set ${qi + 1}: Overall ${q.overall}/100  |  Energy: ${q.energy}  |  Tonal: ${q.tonal}  |  Diversity: ${q.diversity}  |  Duration: ${q.duration}`, margin, yPos);
              yPos += 18;
            });
            doc.setTextColor(0, 0, 0);
          }

          // Anchor key info
          if (setlists.anchorKey) {
            yPos += 10;
            doc.setFont('helvetica', 'normal');
            doc.setFontSize(11);
            doc.text(`Anchor Key: ${setlists.anchorKey}`, margin, yPos);
          }

          // Tonal diagnostics per set
          if (setlists.diagnostics) {
            yPos += 28;
            doc.setFont('helvetica', 'bold');
            doc.setFontSize(14);
            doc.text('Tonal Diagnostics', margin, yPos);
            yPos += 22;

            doc.setFont('helvetica', 'normal');
            doc.setFontSize(10);
            doc.setTextColor(80, 80, 80);
            setlists.diagnostics.forEach((diag, di) => {
              if (!diag) return;
              if (yPos + 30 > pageH - margin) {
                doc.addPage();
                addWatermark();
                yPos = margin + 20;
              }
              doc.text(`Set ${di + 1} - Tonal Flow: ${diag.qualityScore} (avg circle distance: ${diag.avgCircleDistance})`, margin, yPos);
              yPos += 14;
              if (diag.contrastJumps && diag.contrastJumps.length > 0) {
                const jumpsText = `  Key jumps: ${diag.contrastJumps.map(j => `#${j.position} ${j.from}\u2192${j.to} (${j.distance})`).join(', ')}`;
                const jumpLines = doc.splitTextToSize(jumpsText, tableW);
                jumpLines.forEach(line => {
                  doc.text(line, margin, yPos);
                  yPos += 13;
                });
              }
              yPos += 6;
            });
            doc.setTextColor(0, 0, 0);
          }
        }

        const safeBandName = (activeBand?.name || 'band').replace(/[^a-zA-Z0-9]/g, '-').toLowerCase();
        const viewSuffix = isAdvance ? '-advance' : '-stage';
        doc.save(`setlist-${safeBandName}${viewSuffix}-${new Date().toISOString().slice(0, 10)}.pdf`);
      };

      const toggleLock = (setIdx, songId) => {
        const key = `${setIdx}:${songId}`;
        const newLocked = new Set(locked);
        if (newLocked.has(key)) newLocked.delete(key);
        else newLocked.add(key);
        setLocked(newLocked);
      };

      // PHASE 2: Swap with closest-duration fallback
      const swapSong = (setIdx, songIdx) => {
        const set = setlists[setIdx];
        if (!set) return;

        const songToReplace = set.songs[songIdx];
        if (locked.has(`${setIdx}:${songToReplace.id}`)) return showToast('Cannot swap locked song', 'warning');

        // PHASE 3A: candidates should come from ACTIVE songs only
        const candidatePool = activeSongs;

        // Build global used keys from OTHER sets only.
        // Songs in the current set are excluded here; the per-set dedup below
        // (set.songs.some(x => x.id === s.id)) handles intra-set uniqueness.
        const globalUsedSongKeys = new Set();
        if (!settings.allowSongReuse) {
          setlists.forEach((s, i) => {
            if (i !== setIdx) {
              s.songs.forEach(song => {
                globalUsedSongKeys.add(`id:${song.id}`);
                if (song.title && song.artist) {
                  globalUsedSongKeys.add(`ta:${song.title.toLowerCase().trim()}|${song.artist.toLowerCase().trim()}`);
                }
              });
            }
          });
        }

        const getSongDedupKeys = (s) => {
          const k = [];
          if (s.id) k.push(`id:${s.id}`);
          if (s.title && s.artist) k.push(`ta:${s.title.toLowerCase().trim()}|${s.artist.toLowerCase().trim()}`);
          return k;
        };

        let candidates = candidatePool.filter(s =>
          s.id !== songToReplace.id &&
          !set.songs.some(x => x.id === s.id) &&
          (settings.allowSongReuse ? true : !getSongDedupKeys(s).some(key => globalUsedSongKeys.has(key)))
        );

        candidates = candidates
          .map(s => ({ s, diff: Math.abs((Number(parseDuration(s.duration)) || 0) - (Number(parseDuration(songToReplace.duration)) || 0)) }))
          .sort((a, b) => a.diff - b.diff)
          .slice(0, 20)
          .map(x => x.s);

        const pick = candidates.length ? candidates[Math.floor(Math.random() * Math.min(6, candidates.length))] : null;
        if (!pick) return showToast('No suitable replacement', 'warning');

        const newSetlists = [...setlists];
        const newSongsArr = set.songs.map((s, i) => i === songIdx ? pick : s);
        newSetlists[setIdx] = {
          ...set,
          songs: newSongsArr,
          totalTime: newSongsArr.reduce((sum, s) => sum + (Number(parseDuration(s.duration)) || 0), 0)
        };
        setSetlists(newSetlists);
        showToast('Song swapped', 'success');
      };

      const moveSong = (setIdx, fromIdx, toIdx) => {
        const set = setlists[setIdx];
        if (!set || toIdx < 0 || toIdx >= set.songs.length) return;

        const newSongs = [...set.songs];
        const [moved] = newSongs.splice(fromIdx, 1);
        newSongs.splice(toIdx, 0, moved);

        const newSetlists = [...setlists];
        newSetlists[setIdx] = { ...set, songs: newSongs };
        setSetlists(newSetlists);
      };

      // Remove song from setlist and send to Cold List
      const removeSongFromSetlist = (setIdx, songIdx) => {
        const set = setlists[setIdx];
        if (!set) return;

        const song = set.songs[songIdx];
        if (!song) return;

        setConfirmDialog({
          open: true,
          title: 'Remove song from set?',
          message: `"${song.title}" will be removed and sent to Cold List.`,
          confirmLabel: 'Remove song',
          onConfirm: () => {
            const newSongs = set.songs.filter((_, i) => i !== songIdx);
            const newSetlists = [...setlists];
            newSetlists[setIdx] = {
              ...set,
              songs: newSongs,
              totalTime: newSongs.reduce((sum, s) => sum + (Number(parseDuration(s.duration)) || 0), 0)
            };
            setSetlists(newSetlists);

            const lockKey = `${setIdx}:${song.id}`;
            if (locked.has(lockKey)) {
              const newLocked = new Set(locked);
              newLocked.delete(lockKey);
              setLocked(newLocked);
            }

            setSongs(prev => prev.map(s => s.id === song.id ? { ...s, status: 'cold' } : s));
            showToast(`"${song.title}" removed and shelved to Cold List`, 'success');
            setConfirmDialog(prev => ({ ...prev, open: false }));
          }
        });
      };

      // Lock or unlock all songs in a set
      const lockEntireSet = (setIdx, lock) => {
        const set = setlists[setIdx];
        if (!set) return;

        const newLocked = new Set(locked);
        set.songs.forEach(song => {
          const key = `${setIdx}:${song.id}`;
          if (lock) newLocked.add(key);
          else newLocked.delete(key);
        });
        setLocked(newLocked);
        showToast(lock ? 'Set locked' : 'Set unlocked', 'success');
      };

      // --- Cross-Set Drag-and-Drop Handlers ---
      // Ref to throttle dragover state updates (prevents excessive re-renders that cause "stuck" feeling)
      const dragOverRef = React.useRef({ setIdx: null, songIdx: null });

      const handleDragStart = (e, song, setIdx, songIdx) => {
        if (locked.has(`${setIdx}:${song.id}`)) { e.preventDefault(); return; }
        if (!originalSetlists) {
          setOriginalSetlists(JSON.parse(JSON.stringify(setlists)));
        }
        // Set effectAllowed BEFORE setData for cross-browser compat (Firefox requires this order)
        e.dataTransfer.effectAllowed = 'move';
        try { e.dataTransfer.setData('text/plain', song.title); } catch (_) {}
        // Some browsers (Safari) need a brief delay before visual state updates during drag
        requestAnimationFrame(() => {
          setDragState({ active: true, song, fromSetIdx: setIdx, fromSongIdx: songIdx, overSetIdx: null, overSongIdx: null });
        });
      };

      const handleDragEnd = () => {
        dragOverRef.current = { setIdx: null, songIdx: null };
        setDragState(defaultDragState);
        // Let React handle class removal via the dragState reset — no imperative DOM cleanup needed.
      };

      const handleDragOverSong = (e, setIdx, songIdx) => {
        e.preventDefault();
        e.stopPropagation();
        e.dataTransfer.dropEffect = 'move';
        // Throttle: only update React state if the target actually changed
        if (dragOverRef.current.setIdx === setIdx && dragOverRef.current.songIdx === songIdx) return;
        dragOverRef.current = { setIdx, songIdx };
        setDragState(prev => {
          if (prev.overSetIdx === setIdx && prev.overSongIdx === songIdx) return prev;
          return { ...prev, overSetIdx: setIdx, overSongIdx: songIdx };
        });
      };

      const handleDragOverSet = (e, setIdx) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        setDragState(prev => {
          if (prev.overSetIdx === setIdx && prev.overSongIdx === null) return prev;
          return { ...prev, overSetIdx: setIdx, overSongIdx: null };
        });
      };

      const reorderSongWithinSet = (setIdx, fromIdx, toIdx) => {
        const set = setlists[setIdx];
        if (!set || fromIdx === toIdx) return;
        const newSongs = [...set.songs];
        const [moved] = newSongs.splice(fromIdx, 1);
        newSongs.splice(toIdx, 0, moved);
        const newSetlists = [...setlists];
        newSetlists[setIdx] = { ...set, songs: newSongs, totalTime: newSongs.reduce((sum, s) => sum + (Number(parseDuration(s.duration)) || 0), 0) };
        setSetlists(newSetlists);
      };

      const moveSongBetweenSets = (fromSetIdx, toSetIdx, fromSongIdx, toSongIdx) => {
        const newSetlists = JSON.parse(JSON.stringify(setlists));
        const fromSet = newSetlists[fromSetIdx];
        const toSet = newSetlists[toSetIdx];
        if (!fromSet || !toSet) return;

        const [movedSong] = fromSet.songs.splice(fromSongIdx, 1);
        const insertIdx = (toSongIdx !== null && toSongIdx !== undefined) ? Math.min(toSongIdx, toSet.songs.length) : toSet.songs.length;
        toSet.songs.splice(insertIdx, 0, movedSong);

        fromSet.totalTime = fromSet.songs.reduce((sum, s) => sum + (Number(parseDuration(s.duration)) || 0), 0);
        toSet.totalTime = toSet.songs.reduce((sum, s) => sum + (Number(parseDuration(s.duration)) || 0), 0);

        // Migrate lock from source set to destination set
        const oldKey = `${fromSetIdx}:${movedSong.id}`;
        if (locked.has(oldKey)) {
          const newLocked = new Set(locked);
          newLocked.delete(oldKey);
          newLocked.add(`${toSetIdx}:${movedSong.id}`);
          setLocked(newLocked);
        }

        setSetlists(newSetlists);
        showToast(`Moved "${movedSong.title}" to ${toSet.name}`, 'success');
      };

      const handleDropOnSong = (e, toSetIdx, toSongIdx) => {
        e.preventDefault();
        e.stopPropagation();
        if (!dragState.active) return;
        const { fromSetIdx, fromSongIdx } = dragState;
        if (fromSetIdx === toSetIdx) {
          reorderSongWithinSet(toSetIdx, fromSongIdx, toSongIdx);
        } else {
          moveSongBetweenSets(fromSetIdx, toSetIdx, fromSongIdx, toSongIdx);
        }
        handleDragEnd();
      };

      const handleDropOnSet = (e, toSetIdx) => {
        e.preventDefault();
        if (!dragState.active) return;
        const { fromSetIdx, fromSongIdx } = dragState;
        if (fromSetIdx !== toSetIdx) {
          moveSongBetweenSets(fromSetIdx, toSetIdx, fromSongIdx, null);
        }
        handleDragEnd();
      };

      const handleDropToRemove = (e) => {
        e.preventDefault();
        if (!dragState.active) return;
        const { fromSetIdx, fromSongIdx } = dragState;
        removeSongFromSetlist(fromSetIdx, fromSongIdx);
        handleDragEnd();
      };

      const moveToSetDropdown = (fromSetIdx, songIdx, toSetIdx) => {
        if (fromSetIdx === toSetIdx) return;
        if (!originalSetlists) {
          setOriginalSetlists(JSON.parse(JSON.stringify(setlists)));
        }
        moveSongBetweenSets(fromSetIdx, toSetIdx, songIdx, null);
      };

      const resetToOriginal = () => {
        if (!originalSetlists) return;
        setSetlists(originalSetlists);
        setLocked(new Set());
        setOriginalSetlists(null);
        showToast('Order reset to original', 'success');
      };

      // FEATURE: Add a song from the master library directly into a specific set.
      // Appends the song to the end of the target set.
      const addSongToSet = (song, toSetIdx) => {
        const set = setlists[toSetIdx];
        if (!set) return;
        // Prevent duplicates within same set
        if (set.songs.some(s => s.id === song.id)) {
          return showToast(`"${song.title}" is already in Set ${toSetIdx + 1}`, 'warning');
        }
        if (!originalSetlists) setOriginalSetlists(JSON.parse(JSON.stringify(setlists)));
        const parsedSong = { ...song, duration: parseDuration(song.duration) };
        const newSongs = [...set.songs, parsedSong];
        const newSetlists = [...setlists];
        newSetlists[toSetIdx] = {
          ...set,
          songs: newSongs,
          totalTime: newSongs.reduce((sum, s) => sum + (Number(parseDuration(s.duration)) || 0), 0)
        };
        setSetlists(newSetlists);
        showToast(`Added "${song.title}" to Set ${toSetIdx + 1}`, 'success');
      };

      // FEATURE: Swap a song from the master library with a specific slot in a set.
      const replaceSongInSet = (newSong, toSetIdx, toSongIdx) => {
        const set = setlists[toSetIdx];
        if (!set || toSongIdx < 0 || toSongIdx >= set.songs.length) return;
        const oldSong = set.songs[toSongIdx];
        if (locked.has(`${toSetIdx}:${oldSong.id}`)) return showToast('Cannot replace a locked song', 'warning');
        if (!originalSetlists) setOriginalSetlists(JSON.parse(JSON.stringify(setlists)));
        const parsedSong = { ...newSong, duration: parseDuration(newSong.duration) };
        const newSongs = set.songs.map((s, i) => i === toSongIdx ? parsedSong : s);
        const newSetlists = [...setlists];
        newSetlists[toSetIdx] = {
          ...set,
          songs: newSongs,
          totalTime: newSongs.reduce((sum, s) => sum + (Number(parseDuration(s.duration)) || 0), 0)
        };
        // Clean up lock for the replaced song
        const lockKey = `${toSetIdx}:${oldSong.id}`;
        if (locked.has(lockKey)) {
          const newLocked = new Set(locked);
          newLocked.delete(lockKey);
          setLocked(newLocked);
        }
        setSetlists(newSetlists);
        showToast(`Replaced "${oldSong.title}" with "${newSong.title}"`, 'success');
      };

      const [swapFrom, setSwapFrom] = useState(null);

      const swapSets = (idxA, idxB) => {
        if (idxA === idxB || idxA == null || idxB == null) return;
        if (!originalSetlists) {
          setOriginalSetlists(JSON.parse(JSON.stringify(setlists)));
        }
        const newSetlists = [...setlists];
        // Swap the two sets
        [newSetlists[idxA], newSetlists[idxB]] = [newSetlists[idxB], newSetlists[idxA]];
        // Rename sets to reflect positions and remap locks
        const newLocked = new Set();
        locked.forEach(key => {
          // Lock keys are formatted as "setIdx:songId". Split only on the FIRST colon
          // so that song IDs containing colons (edge case) are not truncated.
          const colonPos = key.indexOf(':');
          if (colonPos === -1) return;
          const setIdxStr = key.slice(0, colonPos);
          const songId = key.slice(colonPos + 1);
          const oldIdx = Number(setIdxStr);
          let newIdx = oldIdx;
          if (oldIdx === idxA) newIdx = idxB;
          else if (oldIdx === idxB) newIdx = idxA;
          newLocked.add(`${newIdx}:${songId}`);
        });
        const renamedSetlists = newSetlists.map((set, i) => ({ ...set, name: `Set ${i + 1}` }));
        setSetlists(renamedSetlists);
        setLocked(newLocked);
        setSwapFrom(null);
        showToast(`Swapped Set ${idxA + 1} with Set ${idxB + 1}`, 'success');
      };

      const balanceSets = () => {
        if (setlists.length < 2) return;
        const allSongs = setlists.flatMap(s => s.songs);
        const sorted = [...allSongs].sort((a, b) => (Number(parseDuration(b.duration)) || 0) - (Number(parseDuration(a.duration)) || 0));
        const buckets = setlists.map(() => []);
        const totals = setlists.map(() => 0);

        sorted.forEach(song => {
          let minIdx = 0;
          for (let i = 1; i < totals.length; i++) {
            if (totals[i] < totals[minIdx]) minIdx = i;
          }
          buckets[minIdx].push(song);
          totals[minIdx] += Number(parseDuration(song.duration)) || 0;
        });

        if (!originalSetlists) {
          setOriginalSetlists(JSON.parse(JSON.stringify(setlists)));
        }

        const newSetlists = setlists.map((set, i) => ({
          ...set,
          songs: buckets[i],
          totalTime: totals[i]
        }));
        setSetlists(newSetlists);
        setLocked(new Set());

        const times = totals.map(t => Math.round(t));
        const spread = Math.max(...times) - Math.min(...times);
        showToast(`Sets balanced (spread: ${spread} min)`, 'success');
      };

      const switchBand = (bandId) => {
        setActiveBandId(bandId);
        LS.set(LS_KEYS.active, bandId);
      };

      const createBand = (form) => {
        const newBand = { id: genId(), ...form };
        setBands([...bands, newBand]);
        setActiveBandId(newBand.id);
        LS.set(LS_KEYS.active, newBand.id);
        showToast('Band created', 'success');
      };

      // Band deletion cleanup
      const deleteBand = (band) => {
        if (bands.length === 1) return showToast('Cannot delete the last band', 'error');
        setConfirmDialog({
          open: true,
          title: `Delete "${band.name}"?`,
          message: 'This cannot be undone.',
          confirmLabel: 'Delete band',
          onConfirm: () => {
            const next = bands.filter(b => b.id !== band.id);
            setBands(next);
            LS.remove(LS_KEYS.bandSongs(band.id));
            LS.remove(LS_KEYS.bandSettings(band.id));
            LS.remove(LS_KEYS.bandHistory(band.id));
            LS.remove(LS_KEYS.bandImports(band.id));
            LS.remove(LS_KEYS.bandGigs(band.id));
            if (activeBandId === band.id && next.length) {
              setActiveBandId(next[0].id);
              LS.set(LS_KEYS.active, next[0].id);
            }
            showToast('Band deleted', 'warning');
            setConfirmDialog(prev => ({ ...prev, open: false }));
          }
        });
      };

      const duplicateBand = (band) => {
        const newBand = {
          id: genId(),
          name: `${band.name} (Copy)`,
          icon: band.icon,
          color: band.color
        };
        setBands([...bands, newBand]);
        // Copy songs, settings, gigs, and imports from source band to new band
        const srcSongs = LS.get(LS_KEYS.bandSongs(band.id));
        const srcSettings = LS.get(LS_KEYS.bandSettings(band.id));
        const srcGigs = LS.get(LS_KEYS.bandGigs(band.id));
        const srcImports = LS.get(LS_KEYS.bandImports(band.id));
        const srcWatermark = LS.get(LS_KEYS.bandWatermark(band.id));
        if (srcSongs) {
          // Assign new IDs to duplicated songs to avoid cross-band ID collisions
          const newSongs = srcSongs.map(s => ({ ...s, id: genId() }));
          LS.set(LS_KEYS.bandSongs(newBand.id), newSongs);
        }
        if (srcSettings) LS.set(LS_KEYS.bandSettings(newBand.id), srcSettings);
        if (srcGigs) LS.set(LS_KEYS.bandGigs(newBand.id), srcGigs);
        if (srcImports) LS.set(LS_KEYS.bandImports(newBand.id), srcImports);
        if (srcWatermark) LS.set(LS_KEYS.bandWatermark(newBand.id), srcWatermark);
        showToast('Band duplicated with songs & settings', 'success');
      };

      // Gig Profile functions
      const createGig = (form) => {
        // Store all venue/gig fields from the form
        const newGig = {
          id: genId(),
          name: form.name,
          venue: form.venue || '',
          date: form.date || '',
          notes: form.notes || '',
          venueCity: form.venueCity || '',
          venueState: form.venueState || '',
          venueZip: form.venueZip || '',
          venueType: form.venueType || '',
          venueCapacity: form.venueCapacity || '',
          contactName: form.contactName || '',
          contactEmail: form.contactEmail || '',
          contactPhone: form.contactPhone || '',
          loadInTime: form.loadInTime || '',
          soundCheckTime: form.soundCheckTime || '',
          setStartTime: form.setStartTime || '',
          compensation: form.compensation || '',
          eventType: form.eventType || '',
          ageRestriction: form.ageRestriction || '',
          backlineProvided: !!form.backlineProvided,
          paProvided: !!form.paProvided,
          setlists: null,
          createdAt: Date.now()
        };
        const updated = [...gigs, newGig];
        setGigs(updated);
        LS.set(LS_KEYS.bandGigs(activeBandId), updated);
        showToast('Gig profile created', 'success');
      };

      const deleteGig = (gigId) => {
        setConfirmDialog({
          open: true,
          title: 'Delete this gig profile?',
          message: 'This action cannot be undone.',
          confirmLabel: 'Delete gig',
          onConfirm: () => {
            const updated = gigs.filter(g => g.id !== gigId);
            setGigs(updated);
            LS.set(LS_KEYS.bandGigs(activeBandId), updated);
            showToast('Gig profile deleted', 'warning');
            setConfirmDialog(prev => ({ ...prev, open: false }));
          }
        });
      };

      const saveSetlistsToGig = (gigId) => {
        if (!setlists.length) return;
        const updated = gigs.map(g =>
          g.id === gigId ? { ...g, setlists: JSON.parse(JSON.stringify(setlists)), savedAt: Date.now() } : g
        );
        setGigs(updated);
        LS.set(LS_KEYS.bandGigs(activeBandId), updated);
        showToast('Setlists saved to gig profile', 'success');
      };

      const exportGigCSV = (gigId) => {
        const gig = gigs.find(g => g.id === gigId);
        if (!gig || !gig.setlists || gig.setlists.length === 0) return showToast('No setlists saved for this gig', 'warning');

        const headers = ['Set', 'Order', 'Title', 'Artist', 'Duration', 'Style', 'Key', 'BPM', 'Vocalist', 'Energy'];
        const rows = [];
        gig.setlists.forEach((set, setIdx) => {
          set.songs.forEach((song, songIdx) => {
            const energy = getCompositeEnergy(song);
            rows.push([
              csvSafeCell(set.name || `Set ${setIdx + 1}`),
              csvSafeCell(songIdx + 1),
              csvSafeCell(song.title),
              csvSafeCell(song.artist),
              csvSafeCell(parseDuration(song.duration)),
              csvSafeCell(song.style || ''),
              csvSafeCell(song.key || ''),
              csvSafeCell(song.bpm || ''),
              csvSafeCell(song.vocalist || ''),
              csvSafeCell(Math.round(energy * 10) / 10)
            ]);
          });
        });

        // Add gig metadata as footer rows
        rows.push([]);
        rows.push([csvSafeCell('Gig Info')]);
        rows.push([csvSafeCell('Gig Name'), csvSafeCell(gig.name || '')]);
        rows.push([csvSafeCell('Venue'), csvSafeCell(gig.venue || '')]);
        rows.push([csvSafeCell('Date'), csvSafeCell(gig.date || '')]);
        if (gig.venueCity) rows.push([csvSafeCell('City'), csvSafeCell(gig.venueCity)]);
        if (gig.venueState) rows.push([csvSafeCell('State'), csvSafeCell(gig.venueState)]);
        if (gig.eventType) rows.push([csvSafeCell('Event Type'), csvSafeCell(gig.eventType.replace(/_/g, ' '))]);
        if (gig.contactName) rows.push([csvSafeCell('Contact'), csvSafeCell(gig.contactName)]);
        if (gig.contactEmail) rows.push([csvSafeCell('Email'), csvSafeCell(gig.contactEmail)]);
        if (gig.notes) rows.push([csvSafeCell('Notes'), csvSafeCell(gig.notes)]);

        if (!validateCSVRows(rows)) {
          showToast('CSV export blocked: invalid control characters detected.', 'error');
          return;
        }
        const csv = [headers.map(csvSafeCell).join(','), ...rows.map(r => r.join(','))].join('\n');
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        const safeName = (gig.name || 'gig').replace(/[^a-zA-Z0-9]/g, '-').toLowerCase();
        const dateStr = gig.date || new Date().toISOString().slice(0, 10);
        a.download = `setlist-${safeName}-${dateStr}.csv`;
        a.click();
        setTimeout(() => URL.revokeObjectURL(url), 3000);
        showToast('Gig setlist exported as CSV', 'success');
      };

      const loadSetlistsFromGig = (gigId) => {
        const gig = gigs.find(g => g.id === gigId);
        if (!gig || !gig.setlists) return showToast('No saved setlists for this gig', 'warning');
        setSetlists(gig.setlists);
        setLocked(new Set());
        setOriginalSetlists(null);
        setLastGenerationStats(null);
        showToast(`Loaded setlists from "${gig.name}"`, 'success');
        setGigModal(false);
      };

      const importCSVToGig = (gigId, file) => {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          const text = ev.target?.result || '';
          const result = Papa.parse(String(text), {
            header: true, skipEmptyLines: 'greedy', dynamicTyping: false
          });
          const rows = result.data || [];
          const metaKeys = new Set(['gig info', 'gig name', 'venue', 'date', 'city', 'state', 'event type', 'contact', 'email', 'notes']);
          const setMap = new Map();
          for (const row of rows) {
            const setName = (row['Set'] || '').trim();
            if (!setName || metaKeys.has(setName.toLowerCase())) continue;
            const title = (row['Title'] || '').trim();
            const artist = (row['Artist'] || '').trim();
            if (!title || !artist) continue;
            const song = {
              title: sanitizeInput(title),
              artist: sanitizeInput(artist),
              duration: parseDuration(row['Duration'] || ''),
              style: ((row['Style'] || 'midtempo')).toLowerCase().trim(),
              key: (row['Key'] || '').trim(),
              bpm: (row['BPM'] || '').trim(),
              vocalist: (row['Vocalist'] || '').trim(),
            };
            if (!setMap.has(setName)) setMap.set(setName, []);
            setMap.get(setName).push(song);
          }
          if (setMap.size === 0) {
            showToast('No setlist data found in CSV — make sure it was exported from this app', 'warning');
            return;
          }
          const importedSetlists = Array.from(setMap.entries()).map(([name, songs]) => ({
            name,
            songs,
            totalTime: songs.reduce((sum, s) => sum + (Number(s.duration) || 0), 0)
          }));
          const updated = gigs.map(g =>
            g.id === gigId ? { ...g, setlists: importedSetlists, savedAt: Date.now() } : g
          );
          setGigs(updated);
          LS.set(LS_KEYS.bandGigs(activeBandId), updated);
          showToast(`Imported ${importedSetlists.length} set(s) into gig profile`, 'success');
        };
        reader.readAsText(file);
      };

      return (
        <>
          <IDEBackground>
            <div className={`app-container no-print ${FEATURE_FLAGS.phase2MobileCompatibility && touchDrag.active ? 'touch-fallback-active' : ''}`}>
            <ConfirmDialog
              open={confirmDialog.open}
              title={confirmDialog.title}
              message={confirmDialog.message}
              confirmLabel={confirmDialog.confirmLabel}
              secondaryLabel={confirmDialog.secondaryLabel}
              secondaryAction={confirmDialog.secondaryAction}
              onConfirm={confirmDialog.onConfirm || (() => setConfirmDialog(prev => ({ ...prev, open: false })))}
              onCancel={() => setConfirmDialog(prev => ({ ...prev, open: false }))}
            />

            {toast && (
              <div className="toast-container">
                <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />
              </div>
            )}

            <header className="header">
              <h1>SETLIST GENERATOR</h1>
              <div className="subtitle">v3.8.0 — Force Opener/Closer Fix • Affinity Engine v2 • Song-to-Set Pinning • Master Library Injection</div>
            </header>

            {FEATURE_FLAGS.phase1ReliabilityDataSafety && storageStatus.level !== 'normal' && (
              <div className="storage-health-banner">
                Storage usage is at {storageStatus.percent}% capacity. Export CSV backup to avoid local save failures.
              </div>
            )}

            <div className="band-bar">
              <div className="band-left">
                <div className="band-pill">
                  <span style={{ fontSize: '1.2rem' }}>{activeBand?.icon || '🎵'}</span>
                  <strong>{activeBand?.name || 'No Band'}</strong>
                  <span className="swatch" style={{ background: activeBand?.color || '#ff6b35' }}></span>
                </div>
                <button className="btn btn-small" onClick={() => setBandModal(true)}>Manage Bands</button>
                <button className="btn btn-small" onClick={() => setGigModal(true)} style={{ borderColor: 'var(--accent)', color: 'var(--accent)' }}>Gig Profiles</button>
                <button className="btn btn-small" onClick={() => setVenueModal(true)} style={{ borderColor: '#60a5fa', color: '#60a5fa' }}>📍 Venues</button>
              </div>
              <div className="toolbar">
                <select value={activeBandId || ''} onChange={(e) => switchBand(e.target.value)}>
                  {bands.map(b => <option key={b.id} value={b.id}>{b.icon || '🎵'} {b.name}</option>)}
                </select>
              </div>
            </div>

            {(() => {
              const today = new Date().toISOString().slice(0, 10);
              const next = [...bookings]
                .filter(b => b.date >= today && (b.status === 'confirmed' || b.status === 'pending'))
                .sort((a, b) => a.date.localeCompare(b.date))[0];
              if (!next) return null;
              const sl = next.setlistId ? setlists.find(s => s.id === next.setlistId) : null;
              const msUntil = new Date(next.date) - new Date(today);
              const daysUntil = Math.round(msUntil / 86400000);
              const daysLabel = daysUntil === 0 ? 'TODAY' : daysUntil === 1 ? 'tomorrow' : `in ${daysUntil} days`;
              return (
                <div className="next-gig-banner" onClick={() => setVenueModal(true)}>
                  <span className="next-gig-label">Next Gig</span>
                  <span className="next-gig-venue">{next.venueName || '—'}</span>
                  <span className="next-gig-date">{next.date}{next.startTime && ` · ${next.startTime}`}{next.fee && ` · ${next.fee}`}</span>
                  {sl && <span className="next-gig-setlist">🎵 {sl.name}</span>}
                  <span className={`next-gig-status ${next.status}`}>{next.status.toUpperCase()}</span>
                  <span className="next-gig-days">{daysLabel}</span>
                </div>
              );
            })()}

            <div className="main-grid">
              <SongLibrary
                songs={songs}
                activeCount={activeSongs.length}
                coldCount={coldSongs.length}
                libraryTab={libraryTab}
                onSetLibraryTab={setLibraryTab}
                onAddSong={addSong}
                onUpdateSong={updateSong}
                onDeleteSong={deleteSong}
                onShelfSong={shelfSong}
                onRestoreSong={restoreSong}
                onExportCSV={exportSongs}
                onImportCSVRobust={importCSVRobust}
                onOpenImportModal={() => setImportModal(true)}
                onDownloadSampleCSV={downloadSampleCSV}
                onClearAll={clearAllSongs}
                latestImport={imports[0] || null}
              />

              <SetConfiguration
                settings={settings}
                onChange={setSettings}
                onGenerate={generate}
                onCopy={copyToClipboard}
                onExportPDF={exportPDF}
                onEmailShare={openEmailShare}
                songCount={activeSongs.length}
                libraryTime={activeLibraryTime}
                watermarkImg={watermarkImg}
                onWatermarkUpload={handleWatermarkUpload}
                onClearWatermark={clearWatermark}
                activeSongs={activeSongs}
                onRecoverSnapshot={recoverPreviousSnapshot}
              />
            </div>

            {setlists.length === 0 ? (
              <div className="panel" style={{ marginTop: '1rem' }}>
                <div className="alert alert-warning">
                  No setlists yet. Configure your settings and click <strong>Generate Setlists</strong>.
                  <div style={{ marginTop: '.4rem', color: 'var(--text-muted)', fontSize: '.85rem' }}>
                    Note: Generator uses <strong>Active</strong> songs only (Cold List excluded).
                  </div>
                </div>
              </div>
            ) : (
              <>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: '1rem', flexWrap: 'wrap', gap: '.5rem' }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: '.75rem', flexWrap: 'wrap' }}>
                    <h3 className="panel-title" style={{ margin: 0 }}>Generated Setlists</h3>
                    <div>
                      <div className="view-toggle-bar">
                        <button
                          className={`view-toggle-btn ${viewMode === 'stage' ? 'active-stage' : ''}`}
                          onClick={() => setViewMode('stage')}
                          title="Stage View — minimal, high-contrast for live performance"
                        >
                          🎤 Stage View
                        </button>
                        <button
                          className={`view-toggle-btn ${viewMode === 'advance' ? 'active-advance' : ''}`}
                          onClick={() => setViewMode('advance')}
                          title="Advance View — full arrangement notes for hired musicians"
                        >
                          📋 Advance View
                        </button>
                        <button
                          className="stage-mode-btn"
                          onClick={() => setStageMode(true)}
                          title="Stage Mode — full-screen, large-font view for reading on stage"
                        >
                          📱 Stage Mode
                        </button>
                      </div>
                      {viewMode === 'advance' && (
                        <div className="role-filter-bar">
                          <span className="role-filter-label">Show roles:</span>
                          {ARR_ROLES.map(role => (
                            <label key={role} className="role-filter-check">
                              <input type="checkbox"
                                checked={advanceRoleFilter.has(role)}
                                onChange={e => {
                                  const next = new Set(advanceRoleFilter);
                                  if (e.target.checked) next.add(role); else next.delete(role);
                                  setAdvanceRoleFilter(next);
                                }}
                              />
                              {ARR_ROLE_LABELS[role]}
                            </label>
                          ))}
                        </div>
                      )}
                    </div>
                  </div>
                  <div className="toolbar">
                    <div className="reset-balance-bar">
                      {originalSetlists && (
                        <button className="btn btn-small" onClick={resetToOriginal} title="Reset to original generated order">&#8617; Reset Order</button>
                      )}
                      {setlists.length > 1 && (
                        <>
                          <div style={{ display: 'flex', gap: '.3rem', alignItems: 'center' }}>
                            <select
                              className="move-to-set-select"
                              value={swapFrom != null ? swapFrom : ''}
                              onChange={(e) => setSwapFrom(e.target.value !== '' ? Number(e.target.value) : null)}
                              title="Select first set to swap"
                              style={{ minWidth: '60px' }}
                            >
                              <option value="" disabled>Swap...</option>
                              {setlists.map((_, i) => (
                                <option key={i} value={i}>Set {i + 1}</option>
                              ))}
                            </select>
                            {swapFrom != null && (
                              <>
                                <span style={{ color: 'var(--text-muted)', fontSize: '.8rem' }}>&#8645;</span>
                                <select
                                  className="move-to-set-select"
                                  value=""
                                  onChange={(e) => { if (e.target.value !== '') swapSets(swapFrom, Number(e.target.value)); }}
                                  title="Select second set to swap with"
                                  style={{ minWidth: '60px' }}
                                >
                                  <option value="" disabled>With...</option>
                                  {setlists.map((_, i) => i).filter(i => i !== swapFrom).map(i => (
                                    <option key={i} value={i}>Set {i + 1}</option>
                                  ))}
                                </select>
                              </>
                            )}
                          </div>
                          <button className="btn btn-small" onClick={balanceSets} title="Evenly redistribute songs across sets">&#9878; Balance Sets</button>
                        </>
                      )}
                    </div>
                    <button
                      className={`btn btn-small ${isReorderMode ? 'btn-toggle-active' : ''}`}
                      onClick={() => setIsReorderMode(!isReorderMode)}
                      title={isReorderMode ? 'Exit reorder mode' : 'Enable drag-and-drop reordering'}
                    >
                      {isReorderMode ? 'Done Reordering' : '\u{1F504} Reorder'}
                    </button>
                    <button className="btn btn-small" onClick={generate}>Regenerate</button>
                    <button className="btn btn-small" onClick={() => { setSetlists([]); setLocked(new Set()); setOriginalSetlists(null); setLastGenerationStats(null); setIsReorderMode(false); setSwapFrom(null); }}>Clear</button>
                  </div>
                </div>

                {lastGenerationStats && (
                  <div className="generation-stats">
                    <strong>{lastGenerationStats.songsUsed}</strong> songs used •
                    <strong> {lastGenerationStats.attempts}</strong> selection attempts
                    {setlists.qualityScores && setlists.qualityScores.length > 0 && (
                      <span>
                        {' '} • Quality: {setlists.qualityScores.map((q, qi) => (
                          <span key={qi} title={`Energy: ${q.energy} | Tonal: ${q.tonal} | Diversity: ${q.diversity} | Duration: ${q.duration}`}
                            style={{ color: q.overall >= 75 ? 'var(--success)' : q.overall >= 50 ? 'var(--warning)' : 'var(--error)', fontWeight: 600, cursor: 'help' }}>
                            {qi > 0 ? ' | ' : ''}Set {qi + 1}: <strong>{q.overall}</strong>/100
                          </span>
                        ))}
                      </span>
                    )}
                  </div>
                )}

                <div className="setlists-container">
                  {setlists.map((set, i) => (
                    <SetlistView
                      key={set.id}
                      setIdx={i}
                      setlist={set}
                      locked={locked}
                      setLocked={setLocked}
                      onToggleLock={toggleLock}
                      onSwap={swapSong}
                      onMoveSong={moveSong}
                      onRemoveSong={removeSongFromSetlist}
                      onLockEntireSet={lockEntireSet}
                      onDragStart={handleDragStart}
                      onDragEnd={handleDragEnd}
                      onDragOverSong={handleDragOverSong}
                      onDragOverSet={handleDragOverSet}
                      onDropOnSong={handleDropOnSong}
                      onDropOnSet={handleDropOnSet}
                      onMoveToSet={moveToSetDropdown}
                      dragState={dragState}
                      totalSets={setlists.length}
                      isReorderMode={isReorderMode}
                      touchFallbackEnabled={touchFallbackEnabled}
                      touchDrag={touchDrag}
                      setTouchDrag={setTouchDrag}
                      viewMode={viewMode}
                      advanceRoleFilter={advanceRoleFilter}
                    />
                  ))}
                </div>

                {/* FEATURE: Songs Not In Any Set — master library injection panel */}
                <UnusedSongsPanel
                  activeSongs={activeSongs}
                  setlists={setlists}
                  onAddToSet={addSongToSet}
                  onReplaceInSet={replaceSongInSet}
                />
              </>
            )}

            <EmailShareModal
              open={emailModal.open}
              onClose={() => setEmailModal({ open: false, text: '' })}
              text={emailModal.text}
              viewMode={viewMode}
            />

            <BandModal
              open={bandModal}
              onClose={() => setBandModal(false)}
              bands={bands}
              onCreate={createBand}
              onDelete={deleteBand}
              onDuplicate={duplicateBand}
            />

            <ImportSongsModal
              open={importModal}
              onClose={() => setImportModal(false)}
              onImport={importCanonicalRows}
              existingSongs={songs}
              onRiskyAction={promptBackupBeforeRiskyAction}
            />

            <GigProfileModal
              open={gigModal}
              onClose={() => setGigModal(false)}
              gigs={gigs}
              onCreateGig={createGig}
              onDeleteGig={deleteGig}
              onLoadGig={loadSetlistsFromGig}
              onSaveToGig={saveSetlistsToGig}
              onExportGigCSV={exportGigCSV}
              onImportCSVToGig={importCSVToGig}
              setlists={setlists}
              bandName={activeBand?.name || 'Band'}
            />

            <StageModeOverlay
              open={stageMode}
              onClose={() => setStageMode(false)}
              setlists={setlists}
            />

            <VenueModal
              open={venueModal}
              onClose={() => setVenueModal(false)}
              venues={venues}
              bookings={bookings}
              setlists={setlists}
              epkSettings={epkSettings}
              onSaveEpkSettings={saveEpkSettings}
              onAddVenue={addVenue}
              onUpdateVenue={updateVenue}
              onDeleteVenue={deleteVenue}
              onAddBooking={addBooking}
              onUpdateBooking={updateBooking}
              onDeleteBooking={deleteBooking}
              onBulkAddVenues={bulkAddVenues}
              bandName={activeBand?.name || 'Band'}
              showToast={showToast}
            />
            </div>
          </IDEBackground>

          {dragState.active && (
            <div
              className="optimized-removal-zone"
              onDragOver={(e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }}
              onDrop={handleDropToRemove}
            >
              Drop Here to Remove Song
            </div>
          )}

          <PrintView setlists={setlists} watermarkImg={watermarkImg} />
        </>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<ErrorBoundary><App /></ErrorBoundary>);
  </script>
</body>
</html>
