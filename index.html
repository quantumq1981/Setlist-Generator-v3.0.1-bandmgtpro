      const [copied, setCopied] = React.useState(false);
      if (!open) return null;

      const handleCopy = () => {
        navigator.clipboard.writeText(text).then(() => {
          setCopied(true);
          setTimeout(() => setCopied(false), 2500);
        });
      };

      return (
        <div className="modal-backdrop" onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
          <div className="email-share-modal">
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '.75rem' }}>
              <div>
                <h3 style={{ margin: 0, fontSize: '1rem' }}>📧 Email / Share</h3>
                <div style={{ fontSize: '.75rem', color: 'var(--text-muted)', marginTop: '.15rem' }}>
                  {viewMode === 'advance' ? 'Advance view — per-role arrangement notes included' : 'Stage view — minimal format'}
                </div>
              </div>
              <button className="btn btn-small" onClick={onClose} style={{ fontSize: '1rem', padding: '.1rem .5rem' }}>✕</button>
            </div>
            <textarea
              className="email-share-textarea"
              value={text}
              readOnly
              onClick={(e) => e.target.select()}
            />
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'flex-end', gap: '.6rem', marginTop: '.75rem' }}>
              {copied && <span className="email-share-copied">✓ Copied!</span>}
              <button className="btn btn-small" onClick={onClose}>Close</button>
              <button className="btn btn-primary" style={{ minWidth: '110px' }} onClick={handleCopy}>
                {copied ? '✓ Copied!' : 'Copy All'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    function SetlistView({ setIdx, setlist, locked, setLocked: setLockedSet, onToggleLock, onSwap, onMoveSong, onRemoveSong, onLockEntireSet, onDragStart, onDragEnd, onDragOverSong, onDragOverSet, onDropOnSong, onDropOnSet, onMoveToSet, dragState, totalSets, isReorderMode, touchFallbackEnabled, touchDrag, setTouchDrag, viewMode, advanceRoleFilter }) {
      let runningTime = 0;
      const allLocked = setlist.songs.length > 0 && setlist.songs.every(s => locked.has(`${setIdx}:${s.id}`));
      const isSetDragTarget = dragState && dragState.active && dragState.overSetIdx === setIdx && dragState.fromSetIdx !== setIdx;

      return (
        <div
          className={`setlist${isSetDragTarget ? ' drag-target' : ''}`}
          onDragOver={(e) => onDragOverSet(e, setIdx)}
          onDragEnter={(e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }}
          onDrop={(e) => onDropOnSet(e, setIdx)}
        >
          <div className="setlist-header">
            <div>
              <h4>{setlist.name}</h4>
              <div style={{ fontSize: '.85rem', color: 'var(--text-muted)' }}>
                {setlist.songs.length} songs • {Math.round(setlist.totalTime)} min
              </div>
            </div>
            <div style={{ display: 'flex', gap: '.4rem', alignItems: 'center' }}>
              <button
                className={`btn btn-small ${allLocked ? 'btn-toggle-active' : ''}`}
                onClick={() => onLockEntireSet(setIdx, !allLocked)}
                title={allLocked ? 'Unlock entire set' : 'Lock entire set'}
                style={allLocked ? { borderColor: 'var(--locked)', color: 'var(--locked)' } : {}}
              >
                {allLocked ? 'Unlock Set' : 'Lock Set'}
              </button>
            </div>
          </div>

          {setlist.songs.map((song, songIdx) => {
            const startTime = runningTime;
            runningTime += Number(song.duration) || 0;
            const isLocked = locked.has(`${setIdx}:${song.id}`);
            const isDragging = dragState && dragState.active && dragState.fromSetIdx === setIdx && dragState.fromSongIdx === songIdx;
            const isOver = dragState && dragState.active && dragState.overSetIdx === setIdx && dragState.overSongIdx === songIdx;

            let dragClass = '';
            if (isDragging) dragClass = 'dragging';
            if (isOver) dragClass += ' drag-over-bottom';

            return (
              <div
                key={`${song.id}-${songIdx}`}
                className={`setlist-song ${isLocked ? 'locked' : ''} ${dragClass}`}
                draggable={!isLocked && isReorderMode && !touchFallbackEnabled}
                onDragStart={(e) => onDragStart(e, song, setIdx, songIdx)}
                onDragEnter={(e) => { e.preventDefault(); e.stopPropagation(); }}
                onDragOver={(e) => onDragOverSong(e, setIdx, songIdx)}
                onDrop={(e) => onDropOnSong(e, setIdx, songIdx)}
                onDragEnd={onDragEnd}
                onTouchStart={() => {
                  if (!touchFallbackEnabled || !isReorderMode || isLocked) return;
                  setTouchDrag({ active: true, fromSetIdx: setIdx, fromSongIdx: songIdx });
                }}
                onTouchEnd={() => {
                  if (!touchFallbackEnabled || !touchDrag.active || isLocked) return;
                  if (touchDrag.fromSetIdx === setIdx) onMoveSong(setIdx, touchDrag.fromSongIdx, songIdx);
                  else onMoveToSet(touchDrag.fromSetIdx, touchDrag.fromSongIdx, setIdx);
                  setTouchDrag({ active: false, fromSetIdx: null, fromSongIdx: null });
                }}
              >
                <div className="reorder-controls">
                  <div className="drag-handle" title={!isReorderMode ? 'Enable Reorder Mode to drag' : isLocked ? 'Locked - cannot drag' : 'Drag to reorder or move to another set'}>
                    {isReorderMode && !isLocked ? '⠿' : ''}
                  </div>
                  <div className="mobile-updown" role="group" aria-label={`Reorder ${song.title}`}>
                    <button
                      type="button"
                      className="mobile-move-btn"
                      aria-label={`Move ${song.title} up`}
                      disabled={!isReorderMode || isLocked || songIdx === 0}
                      onClick={() => onMoveSong(setIdx, songIdx, songIdx - 1)}
                    >
                      ↑
                    </button>
                    <button
                      type="button"
                      className="mobile-move-btn"
                      aria-label={`Move ${song.title} down`}
                      disabled={!isReorderMode || isLocked || songIdx === setlist.songs.length - 1}
                      onClick={() => onMoveSong(setIdx, songIdx, songIdx + 1)}
                    >
                      ↓
                    </button>
                  </div>
                </div>
                <div className="song-number">{songIdx + 1}</div>
                <div>
                  <div className="song-title">{song.title}</div>
                  <div className="song-meta">
                    <span>{song.artist}</span>
                    <span className={`song-badge style-${(song.style || '').replace(/\s+/g, '-')}`} title={song.styleInferred ? 'Style inferred — click Edit to confirm' : undefined}>{song.style}{song.styleInferred ? ' ⚡' : ''}</span>
                    <span>{parseDuration(song.duration)}min</span>
                    {song.key && <span style={{ fontSize: '.7rem', color: 'var(--text-muted)' }}>{song.key}</span>}
                  </div>
                  {viewMode === 'stage' && song.arrangement && getArrangementCue(song.arrangement) && (
                    <div className="arrangement-cue" title={getArrangementCue(song.arrangement)}>
                      ▸ {getArrangementCue(song.arrangement)}
                    </div>
                  )}
                </div>
                <div className="song-time">+{Math.round(startTime)}m</div>
                <div className="song-actions">
                  {totalSets > 1 && !isLocked && (
                    <select
                      className="move-to-set-select"
                      value=""
                      onChange={(e) => { if (e.target.value !== '') onMoveToSet(setIdx, songIdx, Number(e.target.value)); }}
                      title="Move to another set"
                    >
                      <option value="" disabled>Set</option>
                      {Array.from({ length: totalSets }, (_, i) => i).filter(i => i !== setIdx).map(i => (
                        <option key={i} value={i}>Set {i + 1}</option>
                      ))}
                    </select>
                  )}
                  <button className={`action-btn ${isLocked ? 'locked' : ''}`} onClick={() => onToggleLock(setIdx, song.id)} title={isLocked ? 'Unlock' : 'Lock'}>
                    {isLocked ? '🔒' : '🔓'}
                  </button>
                  <button className="action-btn" onClick={() => onRemoveSong(setIdx, songIdx)} title="Remove (send to Cold List)" style={{ color: 'var(--error)' }}>
                    ✕
                  </button>
                </div>
                {viewMode === 'advance' && hasArrangementData(song.arrangement) && (() => {
                  const arr = parseArrangement(song.arrangement);
                  const rf = advanceRoleFilter || new Set(ARR_ROLES);
                  const visibleRoles = ARR_ROLES.filter(r => arr[r] && rf.has(r));
                  if (!visibleRoles.length) return null;
                  return (
                    <div className="arrangement-notes-row">
                      <div className="arrangement-label">Arrangement</div>
                      <div className="arrangement-notes-content arr-role-display">
                        {visibleRoles.map(role => (
                          <div key={role} className="arr-role-display-row">
                            <span className="arr-role-display-label">{ARR_ROLE_LABELS[role]}</span>
                            <span className="arr-role-display-text">{arr[role]}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  );
                })()}
              </div>
            );
          })}

          {dragState && dragState.active && dragState.fromSetIdx !== setIdx && (
            <div
              className={`drop-zone-between${dragState.overSetIdx === setIdx && dragState.overSongIdx === null ? ' drag-over' : ''}`}
              onDragOver={(e) => { e.preventDefault(); onDragOverSet(e, setIdx); }}
              onDragLeave={() => {}}
              onDrop={(e) => onDropOnSet(e, setIdx)}
            >
              Drop here to add to {setlist.name}
            </div>
          )}
        </div>
      );
    }

    /******************* IMPORT SONGS MODAL *******************/
    function ImportSongsModal({ open, onClose, onImport, existingSongs, onRiskyAction }) {
      const STEPS = ["input", "map", "normalize", "import"];
      const STEP_LABELS = { input: "1. Input", map: "2. Map Columns", normalize: "3. Review", import: "4. Import" };

      const [step, setStep] = useState("input");
      const [inputTab, setInputTab] = useState("upload");
      const [rawText, setRawText] = useState("");
      const [fileName, setFileName] = useState("");
      const [hasHeaders, setHasHeaders] = useState(true);
      const [delimiter, setDelimiter] = useState("auto");

      // Parsed data
      const [parsedColumns, setParsedColumns] = useState([]);
      const [parsedRows, setParsedRows] = useState([]);

      // Mapping
      const [mapping, setMapping] = useState({ titleCol: null, artistCol: null, durationCol: null, styleCol: null, keyCol: null, tempoCol: null, vocalistCol: null, arrangementCol: null });
      const [confidences, setConfidences] = useState({});

      // Options
      const [opts, setOpts] = useState({
        trimWhitespace: true, normalizeKeys: true, normalizeTempo: true, normalizeVocalist: true,
        stripMetaParen: false, defaultTempo: null, defaultVocalist: "ALL"
      });

      // Results
      const [normalizedResult, setNormalizedResult] = useState(null);
      const [dragover, setDragover] = useState(false);

      if (!open) return null;

      const reset = () => {
        setStep("input"); setInputTab("upload"); setRawText(""); setFileName("");
        setHasHeaders(true); setDelimiter("auto");
        setParsedColumns([]); setParsedRows([]);
        setMapping({ titleCol: null, artistCol: null, durationCol: null, styleCol: null, keyCol: null, tempoCol: null, vocalistCol: null, arrangementCol: null });
        setConfidences({});
        setNormalizedResult(null);
      };

      const handleClose = () => { reset(); onClose(); };

      const parseText = (text, fname) => {
        if (!text || !text.trim()) return;
        const effectiveDelimiter = delimiter === "auto" ? importDetectDelimiter(text) : delimiter;
        const result = Papa.parse(text, {
          delimiter: effectiveDelimiter, header: hasHeaders, skipEmptyLines: "greedy", dynamicTyping: false
        });
        if (!result.data || result.data.length === 0) return;

        let columns, rows;
        if (hasHeaders && result.meta && result.meta.fields) {
          columns = result.meta.fields;
          rows = result.data;
        } else {
          const maxCols = result.data.reduce((max, row) => Math.max(max, Array.isArray(row) ? row.length : 0), 0);
          columns = Array.from({ length: maxCols }, (_, i) => `Column ${i + 1}`);
          rows = result.data.map(row => {
            if (Array.isArray(row)) {
              const obj = {};
              columns.forEach((c, i) => obj[c] = row[i] ?? "");
              return obj;
            }
            return row;
          });
        }

        setParsedColumns(columns);
        setParsedRows(rows);
        if (fname) setFileName(fname);

        // Auto-map
        const autoMap = importAutoMapColumns(columns);
        setMapping(autoMap.mapping);
        setConfidences(autoMap.confidences);
        setStep("map");
      };

      const handleFileUpload = async (file) => {
        if (!file) return;

        // PDF handling
        if (file.name.toLowerCase().endsWith('.pdf') || file.type === 'application/pdf') {
          try {
            const arrayBuffer = await file.arrayBuffer();
            const pageTexts = await pdfExtractText(arrayBuffer);
            const songs = pdfParseAllPages(pageTexts);
            if (songs.length === 0) {
              alert('No song data found in PDF. The PDF may not be in a recognized format.');
              return;
            }
            // Convert to CSV and feed into existing pipeline
            const csvText = pdfSongsToCSV(songs);
            parseText(csvText, file.name);
          } catch (err) {
            console.error('PDF parse error:', err);
            alert('Failed to parse PDF: ' + (err.message || 'Unknown error'));
          }
          return;
        }

        // Regular text/CSV handling
        const reader = new FileReader();
        reader.onload = (ev) => {
          const text = ev.target?.result;
          if (text) parseText(String(text), file.name);
        };
        reader.readAsText(file);
      };

      const handleDrop = (e) => {
        e.preventDefault(); setDragover(false);
        const file = e.dataTransfer?.files?.[0];
        if (file) handleFileUpload(file);
      };

      const runNormalization = () => {
        if (mapping.titleCol == null) return;
        // Convert column indices to column names
        const colMapping = {
          titleCol: parsedColumns[mapping.titleCol],
          artistCol: mapping.artistCol != null ? parsedColumns[mapping.artistCol] : null,
          durationCol: mapping.durationCol != null ? parsedColumns[mapping.durationCol] : null,
          styleCol: mapping.styleCol != null ? parsedColumns[mapping.styleCol] : null,
          keyCol: mapping.keyCol != null ? parsedColumns[mapping.keyCol] : null,
          tempoCol: mapping.tempoCol != null ? parsedColumns[mapping.tempoCol] : null,
          vocalistCol: mapping.vocalistCol != null ? parsedColumns[mapping.vocalistCol] : null,
          arrangementCol: mapping.arrangementCol != null ? parsedColumns[mapping.arrangementCol] : null
        };
        const result = importNormalizeAll(parsedRows, colMapping, opts);
        setNormalizedResult(result);
        setStep("normalize");
      };

      const handleImport = () => {
        if (!normalizedResult || normalizedResult.rows.length === 0) return;
        onImport(normalizedResult.rows, normalizedResult.report);
        handleClose();
      };

      const downloadCanonicalCSV = () => {
        if (!normalizedResult) return;
        const csv = importToCanonicalCSV(normalizedResult.rows);
        const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `canonical-import-${new Date().toISOString().slice(0, 10)}.csv`;
        a.click();
        setTimeout(() => URL.revokeObjectURL(url), 3000);
      };

      const stepIndex = STEPS.indexOf(step);
      const sampleRows = parsedRows.slice(0, 5);

      const WARNING_LABELS = {
        multi_key_first_selected: "Multiple keys found, used first valid",
        key_invalid: "Key could not be recognized",
        tempo_range_first_selected: "Tempo range found, used first value",
        tempo_out_of_range: "Tempo out of range (1-300)",
        tempo_default_applied: "Default tempo applied",
        vocalist_default_all: "Empty vocalist defaulted to ALL",
        multi_vocalist_first_selected: "Multiple vocalists, used first",
        title_trimmed: "Title whitespace trimmed",
        title_smart_punct: "Smart punctuation converted",
        title_meta_paren_stripped: "Meta parenthetical stripped",
        style_aliased: "Style name mapped to standard vocabulary",
        style_unknown: "Style not in known styles list",
        style_inferred_artist: "Style inferred from artist name lookup (⚡)",
        style_inferred_bpm: "Style inferred from BPM range fallback (⚡)",
        artist_trimmed: "Artist whitespace trimmed"
      };

      return (
        <div className="modal-backdrop" onClick={handleClose}>
          <div className="import-modal" onClick={(e) => e.stopPropagation()}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: ".75rem" }}>
              <h3 className="panel-title">Import Songs</h3>
              <button className="btn btn-small" onClick={handleClose}>Close</button>
            </div>

            {/* Step indicators */}
            <div className="import-steps">
              {STEPS.map((s, i) => (
                <div key={s} className={`import-step ${s === step ? "active" : ""} ${i < stepIndex ? "completed" : ""}`}>
                  {STEP_LABELS[s]}
                </div>
              ))}
            </div>

            {/* STEP 1: INPUT */}
            {step === "input" && (
              <div>
                <div className="import-tabs">
                  <button className={`import-tab ${inputTab === "upload" ? "active" : ""}`} onClick={() => setInputTab("upload")}>Upload File</button>
                  <button className={`import-tab ${inputTab === "paste" ? "active" : ""}`} onClick={() => setInputTab("paste")}>Paste Text</button>
                </div>

                {inputTab === "upload" && (
                  <div
                    className={`import-drop-zone ${dragover ? "dragover" : ""}`}
                    onDragOver={(e) => { e.preventDefault(); setDragover(true); }}
                    onDragLeave={() => setDragover(false)}
                    onDrop={handleDrop}
                    onClick={() => document.getElementById("import-file-input")?.click()}
                  >
                    <div style={{ fontSize: "2rem", marginBottom: ".5rem" }}>Drop file here or click to browse</div>
                    <div style={{ fontSize: ".85rem" }}>Supports CSV, TSV, TXT, and PDF</div>
                    <input id="import-file-input" type="file" accept=".csv,.tsv,.txt,.tab,.pdf" onChange={(e) => handleFileUpload(e.target.files?.[0])} />
                  </div>
                )}

                {inputTab === "paste" && (
                  <div>
                    <textarea
                      className="import-textarea"
                      placeholder={"Paste your song data here...\n\nExamples:\ntitle,key,tempo,vocalist\nCome Together,Dm,82,John\nSweet Home Alabama,D,100,ALL"}
                      value={rawText}
                      onChange={(e) => setRawText(e.target.value)}
                    />
                    <div className="import-footer">
                      <button className="btn btn-primary" onClick={() => { const run = () => parseText(rawText, "pasted-text"); if (FEATURE_FLAGS.phase1ReliabilityDataSafety && rawText.length > 2000 && onRiskyAction) onRiskyAction('Large pasted import', run); else run(); }} disabled={!rawText.trim()}>
                        Parse Text
                      </button>
                    </div>
                  </div>
                )}

                <div className="set-config" style={{ marginTop: ".75rem" }}>
                  <div className="input-group">
                    <label>Delimiter</label>
                    <select value={delimiter} onChange={(e) => setDelimiter(e.target.value)}>
                      <option value="auto">Auto-detect</option>
                      <option value=",">Comma (,)</option>
                      <option value="&#9;">Tab</option>
                      <option value="|">Pipe (|)</option>
                      <option value=";">Semicolon (;)</option>
                    </select>
                  </div>
                  <div className="input-group">
                    <label style={{ display: "flex", alignItems: "center", gap: ".5rem" }}>
                      <input type="checkbox" checked={hasHeaders} onChange={(e) => setHasHeaders(e.target.checked)} style={{ width: "auto" }} />
                      First row is headers
                    </label>
                  </div>
                </div>
              </div>
            )}

            {/* STEP 2: MAP COLUMNS */}
            {step === "map" && (
              <div>
                <div style={{ marginBottom: ".75rem", fontSize: ".85rem", color: "var(--text-muted)" }}>
                  Parsed <strong style={{ color: "var(--accent)" }}>{parsedRows.length}</strong> rows with <strong style={{ color: "var(--accent)" }}>{parsedColumns.length}</strong> columns
                  {fileName && <span> from <strong>{fileName}</strong></span>}
                </div>

                {/* Preview table */}
                <div style={{ overflowX: "auto" }}>
                  <table className="import-preview-table">
                    <thead>
                      <tr>{parsedColumns.map((c, i) => <th key={i}>{c}</th>)}</tr>
                    </thead>
                    <tbody>
                      {sampleRows.map((row, ri) => (
                        <tr key={ri}>{parsedColumns.map((c, ci) => <td key={ci}>{String(row[c] ?? "")}</td>)}</tr>
                      ))}
                    </tbody>
                  </table>
                </div>

                {/* Column mapping */}
                <h4 style={{ color: "var(--accent)", margin: ".75rem 0 .5rem", fontSize: ".9rem" }}>Column Mapping</h4>
                <div className="import-mapping-grid">
                  {[
                    { key: "titleCol", label: "Title *", required: true },
                    { key: "artistCol", label: "Artist" },
                    { key: "durationCol", label: "Duration" },
                    { key: "styleCol", label: "Style / Genre" },
                    { key: "keyCol", label: "Key" },
                    { key: "tempoCol", label: "Tempo / BPM" },
                    { key: "vocalistCol", label: "Vocalist" },
                    { key: "arrangementCol", label: "Arrangement Notes" }
                  ].map(({ key, label, required }) => (
                    <div key={key} className="import-mapping-item">
                      <label>
                        {label}
                        {confidences[key] && <span className="confidence">{confidences[key]}% match</span>}
                      </label>
                      <select
                        value={mapping[key] ?? "none"}
                        onChange={(e) => setMapping({ ...mapping, [key]: e.target.value === "none" ? null : parseInt(e.target.value) })}
                      >
                        <option value="none">{required ? "-- Select --" : "None"}</option>
                        {parsedColumns.map((c, i) => <option key={i} value={i}>{c}</option>)}
                      </select>
                    </div>
                  ))}
                </div>

                {/* Normalization options */}
                <h4 style={{ color: "var(--accent)", margin: ".75rem 0 .5rem", fontSize: ".9rem" }}>Normalization Options</h4>
                <div className="import-options">
                  {[
                    { key: "normalizeKeys", label: "Normalize keys (Cmaj -> C)" },
                    { key: "normalizeTempo", label: "Normalize tempo" },
                    { key: "normalizeVocalist", label: "Normalize vocalist" },
                    { key: "stripMetaParen", label: "Strip meta parens e.g. (demo)" }
                  ].map(({ key, label }) => (
                    <label key={key} className="import-option">
                      <input type="checkbox" checked={opts[key]} onChange={(e) => setOpts({ ...opts, [key]: e.target.checked })} />
                      {label}
                    </label>
                  ))}
                </div>

                <div className="set-config" style={{ marginTop: ".5rem" }}>
                  <div className="input-group">
                    <label>Default Tempo (blank = none)</label>
                    <input
                      type="number" min="1" max="300" placeholder="e.g. 120"
                      value={opts.defaultTempo ?? ""}
                      onChange={(e) => setOpts({ ...opts, defaultTempo: e.target.value ? parseInt(e.target.value) : null })}
                    />
                  </div>
                  <div className="input-group">
                    <label>Default Vocalist</label>
                    <input
                      value={opts.defaultVocalist}
                      onChange={(e) => setOpts({ ...opts, defaultVocalist: e.target.value || "ALL" })}
                    />
                  </div>
                </div>

                <div className="import-footer">
                  <button className="btn btn-small" onClick={() => { setStep("input"); }}>Back</button>
                  <button className="btn btn-primary" onClick={runNormalization} disabled={mapping.titleCol == null}>
                    Normalize & Preview
                  </button>
                </div>
              </div>
            )}

            {/* STEP 3: NORMALIZE / REVIEW */}
            {step === "normalize" && normalizedResult && (
              <div>
                {/* Guardrail banner */}
                <div className="import-guardrail">
                  Nothing is silently dropped. Only rows with empty titles are rejected. All other rows are imported even if key/tempo/vocalist are blank.
                </div>

                {/* Summary stats */}
                <div className="import-results-summary">
                  <div className="import-stat success">
                    <div className="number">{normalizedResult.report.rowsParsed}</div>
                    <div className="label">Rows Parsed</div>
                  </div>
                  <div className="import-stat success">
                    <div className="number">{normalizedResult.report.rowsImported}</div>
                    <div className="label">Will Import</div>
                  </div>
                  <div className={`import-stat ${normalizedResult.report.rowsRejected > 0 ? "error" : "success"}`}>
                    <div className="number">{normalizedResult.report.rowsRejected}</div>
                    <div className="label">Rejected</div>
                  </div>
                </div>

                {/* Equation check */}
                <div style={{ textAlign: "center", fontSize: ".8rem", color: "var(--text-muted)", margin: ".25rem 0 .75rem" }}>
                  {normalizedResult.report.rowsParsed} parsed = {normalizedResult.report.rowsImported} imported + {normalizedResult.report.rowsRejected} rejected
                  {normalizedResult.report.rowsParsed === normalizedResult.report.rowsImported + normalizedResult.report.rowsRejected
                    ? <span style={{ color: "var(--success)", marginLeft: ".5rem" }}>&#10003; Verified</span>
                    : <span style={{ color: "var(--error)", marginLeft: ".5rem" }}>Mismatch!</span>
                  }
                </div>

                {/* Warning counts */}
                {Object.keys(normalizedResult.report.warningCounts).length > 0 && (
                  <div>
                    <h4 style={{ color: "var(--warning)", fontSize: ".85rem", marginBottom: ".5rem" }}>Normalization Warnings</h4>
                    <div className="import-warnings-list">
                      {Object.entries(normalizedResult.report.warningCounts).map(([code, count]) => (
                        <div key={code} className="import-warning-item">
                          <span className="import-warning-code">{code}</span>
                          <span>{WARNING_LABELS[code] || code}</span>
                          <span style={{ marginLeft: "auto", color: "var(--accent)", fontWeight: 700 }}>x{count}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* Sample changes */}
                {normalizedResult.report.sampleChanges.length > 0 && (
                  <div style={{ marginTop: ".75rem" }}>
                    <h4 style={{ color: "var(--accent)", fontSize: ".85rem", marginBottom: ".5rem" }}>
                      Sample Changes (showing {Math.min(normalizedResult.report.sampleChanges.length, 20)} of {normalizedResult.report.sampleChanges.length})
                    </h4>
                    <div style={{ maxHeight: "160px", overflowY: "auto" }}>
                      <table className="import-preview-table">
                        <thead><tr><th>Row</th><th>Field</th><th>Original</th><th>Normalized</th></tr></thead>
                        <tbody>
                          {normalizedResult.report.sampleChanges.slice(0, 20).flatMap((rc) =>
                            rc.changes.map((c, ci) => (
                              <tr key={`${rc.rowIndex}-${ci}`}>
                                <td>{rc.rowIndex}</td>
                                <td>{c.field}</td>
                                <td style={{ color: "var(--error)" }}>{c.original || "(empty)"}</td>
                                <td style={{ color: "var(--success)" }}>{c.normalized || "(empty)"}</td>
                              </tr>
                            ))
                          )}
                        </tbody>
                      </table>
                    </div>
                  </div>
                )}

                {/* Rejected rows */}
                {normalizedResult.rejected.length > 0 && (
                  <div style={{ marginTop: ".75rem" }}>
                    <h4 style={{ color: "var(--error)", fontSize: ".85rem", marginBottom: ".5rem" }}>
                      Rejected Rows ({normalizedResult.rejected.length})
                    </h4>
                    <table className="import-rejected-table">
                      <thead><tr><th>Row #</th><th>Reason</th><th>Raw Data</th></tr></thead>
                      <tbody>
                        {normalizedResult.rejected.map((r, i) => (
                          <tr key={i}>
                            <td>{r.rowIndex}</td>
                            <td>{r.reason}</td>
                            <td style={{ maxWidth: "300px", overflow: "hidden", textOverflow: "ellipsis" }}>
                              {JSON.stringify(r.raw).slice(0, 100)}
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                )}

                {/* Normalized data preview */}
                <div style={{ marginTop: ".75rem" }}>
                  <h4 style={{ color: "var(--accent)", fontSize: ".85rem", marginBottom: ".5rem" }}>
                    Import Preview (first 10 rows)
                  </h4>
                  <div style={{ overflowX: "auto" }}>
                    <table className="import-preview-table">
                      <thead><tr><th>Title</th><th>Artist</th><th>Dur</th><th>Style</th><th>Key</th><th>BPM</th><th>Vocalist</th></tr></thead>
                      <tbody>
                        {normalizedResult.rows.slice(0, 10).map((r, i) => (
                          <tr key={i}>
                            <td>{r.title}</td>
                            <td>{r.artist}</td>
                            <td>{r.duration}</td>
                            <td>{r.style}</td>
                            <td>{r.key}</td>
                            <td>{r.tempo}</td>
                            <td>{r.vocalist}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>

                <div className="import-footer">
                  <button className="btn btn-small" onClick={() => setStep("map")}>Back</button>
                  <button className="btn btn-small" onClick={downloadCanonicalCSV}>Download Canonical CSV</button>
                  <button className="btn btn-primary" onClick={handleImport} disabled={normalizedResult.rows.length === 0}>
                    Import {normalizedResult.rows.length} Songs
                  </button>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

        if (!form.name.trim()) return;
        onCreate(form);
        setForm({ name: '', icon: '🎵', color: '#ff6b35' });
      };

      return (
        <div className="modal-backdrop" onClick={onClose}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="panel-header">
              <h3 className="panel-title">Manage Bands</h3>
              <button className="btn btn-small" onClick={onClose}>Close</button>

              <label>Band Name</label>
              <input value={form.name} onChange={e => setForm({ ...form, name: e.target.value })} placeholder="Enter band name" />
            </div>

            <div className="set-config">
              <div className="input-group">
                <label>Icon</label>
                <input value={form.icon} onChange={e => setForm({ ...form, icon: e.target.value })} placeholder="🎵" />
              </div>
              <div className="input-group">
                <label>Color</label>
                <input type="color" value={form.color} onChange={e => setForm({ ...form, color: e.target.value })} />
              </div>
            </div>

            <button className="btn btn-primary" onClick={handleCreate} style={{ width: '100%', marginBottom: '1rem' }}>
              Create Band
            </button>

            <div style={{ maxHeight: '300px', overflowY: 'auto' }}>
              {bands.map(band => (
                <div key={band.id} className="band-row">
                  <div style={{ display: 'flex', alignItems: 'center', gap: '.5rem' }}>
                    <span style={{ fontSize: '1.2rem' }}>{band.icon}</span>
                    <div>
                      <div style={{ fontWeight: 600 }}>{band.name}</div>

              ))}
            </div>

                  width: '100%',
                  height: '100%',
                  opacity: 0.12,
                  pointerEvents: 'none',
                  zIndex: 0

                  {set.name}

                    <span style={{ marginLeft: '12px', fontSize: '11pt', fontWeight: 'normal' }}>

                {/* Column headers */}
                <div style={{ fontFamily: "'Oswald', 'Helvetica Neue', Arial, sans-serif", fontSize: '9pt', fontWeight: 'bold', color: '#666', display: 'grid', gridTemplateColumns: '30px 1fr 50px 50px 70px', gap: '4px', borderBottom: '1px solid #ccc', paddingBottom: '4px', marginBottom: '8px' }}>

                  <span>TITLE / ARTIST</span>
                  <span>KEY</span>
                  <span>BPM</span>
                  <span>STYLE</span>

                <div>
                  {set.songs.map((song, idx) => (
                    <div key={`print-${song.id}-${idx}`} style={{ fontFamily: "'Oswald', 'Helvetica Neue', Arial, sans-serif", fontSize: '18pt', fontWeight: 'bold', lineHeight: 1.0, marginBottom: '6px', display: 'grid', gridTemplateColumns: '30px 1fr 50px 50px 70px', gap: '4px', alignItems: 'baseline' }}>

                      <span style={{ fontSize: '12pt' }}>{song.key || ''}</span>

                  ))}

              </div>
            </div>
          ))}
        </div>

    function GigProfileModal({ open, onClose, gigs, onCreateGig, onDeleteGig, onLoadGig, onSaveToGig, onExportGigCSV, onImportCSVToGig, setlists, bandName }) {
      const [form, setForm] = useState({
        name: '', venue: '', date: '', notes: '',
        // Venue info fields (common across GigSalad, Sonicbids, Bands in Town, Gigmit, etc.)
        venueCity: '', venueState: '', venueZip: '',
        venueType: '', // bar, club, festival, private, corporate, theater, outdoor
        venueCapacity: '',
        contactName: '', contactEmail: '', contactPhone: '',
        loadInTime: '', soundCheckTime: '', setStartTime: '',
        compensation: '', // flat fee, door split, percentage, etc.
        eventType: '', // wedding, corporate, festival, bar gig, private party
        ageRestriction: '', // all ages, 18+, 21+
        backlineProvided: false,
        paProvided: false
      });
      const [showVenueDetails, setShowVenueDetails] = useState(false);

      if (!open) return null;

      const handleCreate = () => {
        if (!form.name.trim()) return;
        onCreateGig(form);
        setForm({
          name: '', venue: '', date: '', notes: '',
          venueCity: '', venueState: '', venueZip: '',
          venueType: '', venueCapacity: '',
          contactName: '', contactEmail: '', contactPhone: '',
          loadInTime: '', soundCheckTime: '', setStartTime: '',
          compensation: '', eventType: '', ageRestriction: '',
          backlineProvided: false, paProvided: false
        });
      };

      return (
        <div className="modal-backdrop" onClick={onClose}>
          <div className="modal" onClick={e => e.stopPropagation()} style={{ width: 'min(720px, 95vw)', maxHeight: '90vh', overflowY: 'auto' }}>
            <div className="panel-header">
              <h3 className="panel-title">Gig Profiles — {bandName}</h3>
              <button className="btn btn-small" onClick={onClose}>Close</button>
            </div>

            <div style={{ marginBottom: '1rem', fontSize: '.85rem', color: 'var(--text-muted)' }}>
              Create gig profiles for specific venues and dates. Save and load setlists for each gig. Export gig setlists as CSV.
            </div>

            {setlists.length === 0 && gigs.length > 0 && (
              <div className="alert" style={{ marginBottom: '1rem', background: 'rgba(255,193,7,0.1)', border: '1px solid var(--warning)', borderRadius: '8px', padding: '.75rem', fontSize: '.82rem', color: 'var(--warning)' }}>
                <strong>Tip:</strong> Generate setlists first, then return here to save them to a gig profile. The <strong>Save</strong> button appears next to each gig once setlists are available.
              </div>
            )}

            {/* Basic Gig Info */}
            <div className="set-config">
              <div className="input-group">
                <label>Gig Name*</label>
                <input value={form.name} onChange={e => setForm({ ...form, name: e.target.value })} placeholder="e.g. Friday at The Roxy" />
              </div>
              <div className="input-group">
                <label>Venue Name</label>
                <input value={form.venue} onChange={e => setForm({ ...form, venue: e.target.value })} placeholder="e.g. The Roxy" />
              </div>
            </div>
            <div className="set-config">
              <div className="input-group">
                <label>Date</label>
                <input type="date" value={form.date} onChange={e => setForm({ ...form, date: e.target.value })} />
              </div>
              <div className="input-group">
                <label>Event Type</label>
                <select value={form.eventType} onChange={e => setForm({ ...form, eventType: e.target.value })}>
                  <option value="">Select...</option>
                  <option value="bar_gig">Bar / Club Gig</option>
                  <option value="festival">Festival</option>
                  <option value="corporate">Corporate Event</option>
                  <option value="wedding">Wedding / Reception</option>
                  <option value="private_party">Private Party</option>
                  <option value="theater">Theater / Concert Hall</option>
                  <option value="outdoor">Outdoor Event</option>
                  <option value="house_concert">House Concert</option>
                  <option value="charity">Charity / Benefit</option>
                  <option value="other">Other</option>
                </select>
              </div>
            </div>

            {/* Expandable Venue Details */}
            <button
              className="btn btn-small"
              onClick={() => setShowVenueDetails(!showVenueDetails)}
              style={{ width: '100%', marginBottom: '.75rem', textAlign: 'left' }}
            >
              {showVenueDetails ? '▾' : '▸'} Venue Details &amp; Contact Info
            </button>

            {showVenueDetails && (
              <div style={{ background: 'var(--primary)', border: '1px solid var(--border)', borderRadius: '8px', padding: '.75rem', marginBottom: '.75rem' }}>
                <div className="set-config">
                  <div className="input-group">
                    <label>City</label>
                    <input value={form.venueCity} onChange={e => setForm({ ...form, venueCity: e.target.value })} placeholder="City" />
                  </div>
                  <div className="input-group">
                    <label>State/Region</label>
                    <input value={form.venueState} onChange={e => setForm({ ...form, venueState: e.target.value })} placeholder="State" />
                  </div>
                </div>
                <div className="set-config">
                  <div className="input-group">
                    <label>ZIP/Postal Code</label>
                    <input value={form.venueZip} onChange={e => setForm({ ...form, venueZip: e.target.value })} placeholder="ZIP" />
                  </div>
                  <div className="input-group">
                    <label>Venue Type</label>
                    <select value={form.venueType} onChange={e => setForm({ ...form, venueType: e.target.value })}>
                      <option value="">Select...</option>
                      <option value="bar">Bar / Pub</option>
                      <option value="club">Night Club</option>
                      <option value="restaurant">Restaurant</option>
                      <option value="theater">Theater</option>
                      <option value="arena">Arena / Stadium</option>
                      <option value="outdoor_amphitheater">Outdoor Amphitheater</option>
                      <option value="festival_grounds">Festival Grounds</option>
                      <option value="hotel_ballroom">Hotel / Ballroom</option>
                      <option value="community_center">Community Center</option>
                      <option value="private_residence">Private Residence</option>
                      <option value="winery_brewery">Winery / Brewery</option>
                      <option value="coffeehouse">Coffeehouse</option>
                      <option value="other">Other</option>
                    </select>
                  </div>
                </div>
                <div className="set-config">
                  <div className="input-group">
                    <label>Capacity</label>
                    <input value={form.venueCapacity} onChange={e => setForm({ ...form, venueCapacity: e.target.value })} placeholder="e.g. 200" />
                  </div>
                  <div className="input-group">
                    <label>Age Restriction</label>
                    <select value={form.ageRestriction} onChange={e => setForm({ ...form, ageRestriction: e.target.value })}>
                      <option value="">Select...</option>
                      <option value="all_ages">All Ages</option>
                      <option value="18+">18+</option>
                      <option value="21+">21+</option>
                    </select>
                  </div>
                </div>

                <div style={{ borderTop: '1px solid var(--border)', marginTop: '.5rem', paddingTop: '.5rem' }}>
                  <div style={{ fontSize: '.75rem', fontWeight: 600, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '.05em', marginBottom: '.4rem' }}>Contact Info</div>
                  <div className="set-config">
                    <div className="input-group">
                      <label>Contact Name</label>
                      <input value={form.contactName} onChange={e => setForm({ ...form, contactName: e.target.value })} placeholder="Booking contact" />
                    </div>
                    <div className="input-group">
                      <label>Contact Email</label>
                      <input type="email" value={form.contactEmail} onChange={e => setForm({ ...form, contactEmail: e.target.value })} placeholder="email@venue.com" />
                    </div>
                  </div>
                  <div className="set-config">
                    <div className="input-group">
                      <label>Contact Phone</label>
                      <input value={form.contactPhone} onChange={e => setForm({ ...form, contactPhone: e.target.value })} placeholder="(555) 123-4567" />
                    </div>
                    <div className="input-group">
                      <label>Compensation</label>
                      <input value={form.compensation} onChange={e => setForm({ ...form, compensation: e.target.value })} placeholder="e.g. $500, door split" />
                    </div>
                  </div>
                </div>

                <div style={{ borderTop: '1px solid var(--border)', marginTop: '.5rem', paddingTop: '.5rem' }}>
                  <div style={{ fontSize: '.75rem', fontWeight: 600, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '.05em', marginBottom: '.4rem' }}>Schedule &amp; Logistics</div>
                  <div className="set-config">
                    <div className="input-group">
                      <label>Load-In Time</label>
                      <input type="time" value={form.loadInTime} onChange={e => setForm({ ...form, loadInTime: e.target.value })} />
                    </div>
                    <div className="input-group">
                      <label>Sound Check</label>
                      <input type="time" value={form.soundCheckTime} onChange={e => setForm({ ...form, soundCheckTime: e.target.value })} />
                    </div>
                  </div>
                  <div className="set-config">
                    <div className="input-group">
                      <label>Set Start Time</label>
                      <input type="time" value={form.setStartTime} onChange={e => setForm({ ...form, setStartTime: e.target.value })} />
                    </div>
                    <div className="input-group" style={{ display: 'flex', gap: '.75rem', alignItems: 'flex-end' }}>
                      <label style={{ display: 'flex', alignItems: 'center', gap: '.4rem', cursor: 'pointer', textTransform: 'none', fontSize: '.8rem' }}>
                        <input type="checkbox" checked={form.backlineProvided} onChange={e => setForm({ ...form, backlineProvided: e.target.checked })} style={{ width: 'auto' }} />
                        Backline
                      </label>
                      <label style={{ display: 'flex', alignItems: 'center', gap: '.4rem', cursor: 'pointer', textTransform: 'none', fontSize: '.8rem' }}>
                        <input type="checkbox" checked={form.paProvided} onChange={e => setForm({ ...form, paProvided: e.target.checked })} style={{ width: 'auto' }} />
                        PA Provided
                      </label>
                    </div>
                  </div>
                </div>
              </div>
            )}

            <div className="input-group">
              <label>Notes</label>
              <textarea value={form.notes} onChange={e => setForm({ ...form, notes: e.target.value })} placeholder="Special requests, parking info, dress code..." rows={2} style={{ resize: 'vertical' }} />
            </div>

            <button className="btn btn-primary" onClick={handleCreate} style={{ width: '100%', marginBottom: '1rem' }}>
              Create Gig Profile
            </button>

            <div style={{ maxHeight: '350px', overflowY: 'auto' }}>
              {gigs.length === 0 ? (
                <div style={{ textAlign: 'center', color: 'var(--text-muted)', padding: '1.5rem' }}>
                  No gig profiles yet. Create one above.
                </div>
              ) : (
                gigs.sort((a, b) => {
                  if (a.date && b.date) return a.date.localeCompare(b.date);
                  if (a.date) return -1;
                  if (b.date) return 1;
                  return (b.createdAt || 0) - (a.createdAt || 0);
                }).map(gig => (
                  <div key={gig.id} className="band-row" style={{ flexDirection: 'column', alignItems: 'stretch', gap: '.5rem' }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontWeight: 700 }}>{gig.name}</div>
                        <div style={{ fontSize: '.8rem', color: 'var(--text-muted)' }}>
                          {gig.venue && <span>{gig.venue}</span>}
                          {gig.venueCity && <span>, {gig.venueCity}</span>}
                          {gig.venueState && <span>, {gig.venueState}</span>}
                          {gig.date && <span> | {gig.date}</span>}
                          {gig.eventType && <span> | {gig.eventType.replace(/_/g, ' ')}</span>}
                          {gig.setlists && <span> | {gig.setlists.length} set(s)</span>}
                        </div>
                        {gig.setStartTime && <div style={{ fontSize: '.75rem', color: 'var(--accent)' }}>Start: {gig.setStartTime}</div>}
                        {gig.savedAt && (
                          <div style={{ fontSize: '.72rem', color: 'var(--success)' }}>
                            Setlists saved: {new Date(gig.savedAt).toLocaleString()}
                          </div>
                        )}
                        {!gig.setlists && (
                          <div style={{ fontSize: '.72rem', color: 'var(--text-muted)', fontStyle: 'italic' }}>
                            No setlists saved yet
                          </div>
                        )}
                        {gig.notes && <div style={{ fontSize: '.75rem', color: 'var(--text-muted)', fontStyle: 'italic', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{gig.notes}</div>}
                      </div>
                      <div style={{ display: 'flex', gap: '.3rem', flexShrink: 0, flexWrap: 'wrap', justifyContent: 'flex-end' }}>
                        <button
                          className="btn btn-small"
                          onClick={() => onSaveToGig(gig.id)}
                          disabled={setlists.length === 0}
                          title={setlists.length === 0 ? 'Generate setlists first, then save them here' : 'Save current setlists to this gig'}
                          style={{ borderColor: 'var(--success)', color: setlists.length === 0 ? 'var(--text-muted)' : 'var(--success)', opacity: setlists.length === 0 ? 0.5 : 1 }}
                        >
                          Save
                        </button>
                        {gig.setlists && gig.setlists.length > 0 && (
                          <>
                            <button className="btn btn-small" onClick={() => onLoadGig(gig.id)} style={{ borderColor: 'var(--accent)', color: 'var(--accent)' }}>
                              Load
                            </button>
                            <button className="btn btn-small" onClick={() => onExportGigCSV(gig.id)} style={{ borderColor: 'var(--warning)', color: 'var(--warning)' }}>
                              CSV
                            </button>
                          </>
                        )}
                        <label className="btn btn-small" style={{ borderColor: '#60a5fa', color: '#60a5fa', cursor: 'pointer', margin: 0 }} title="Import a previously exported setlist CSV directly into this gig profile">
                          Import
                          <input
                            type="file"
                            accept=".csv"
                            style={{ display: 'none' }}
                            onChange={e => {
                              if (e.target.files?.[0]) {
                                onImportCSVToGig(gig.id, e.target.files[0]);
                                e.target.value = '';
                              }
                            }}
                          />
                        </label>
                        <button className="btn btn-small" onClick={() => onDeleteGig(gig.id)}>Del</button>
                      </div>
                    </div>
                  </div>
                ))
              )}
            </div>
          </div>
        </div>
      );
    }

    /******************* STAGE MODE OVERLAY *******************/
    function StageModeOverlay({ open, onClose, setlists }) {
      useEffect(() => {
        if (!open) return;
        const handler = (e) => { if (e.key === 'Escape') onClose(); };
        document.addEventListener('keydown', handler);
        return () => document.removeEventListener('keydown', handler);
      }, [open]);
      if (!open || !setlists || setlists.length === 0) return null;
      return (
        <div className="stage-overlay">
          <div className="stage-overlay-inner">
            <button className="stage-overlay-close" onClick={onClose}>✕  EXIT STAGE MODE  (Esc)</button>
            {setlists.map((setlist, si) => {
              let runningTime = 0;
              return (
                <div key={si} className="stage-overlay-set">
                  <div className="stage-overlay-set-header">
                    {setlist.name} · {setlist.songs.length} songs · {Math.round(setlist.totalTime)} min
                  </div>
                  {setlist.songs.map((song, songIdx) => {
                    const t = runningTime;
                    runningTime += Number(song.duration) || 0;
                    const cue = song.arrangement ? getArrangementCue(song.arrangement) : '';
                    return (
                      <div key={song.id + '-' + songIdx} className="stage-overlay-song">
                        <span className="stage-song-num">{songIdx + 1}</span>
                        <div className="stage-song-body">
                          <div className="stage-song-title">{song.title}</div>
                          <div className="stage-song-meta">
                            <span>{song.artist}</span>
                            {song.key && <span className="stage-song-key">{song.key}</span>}
                            {song.bpm && <span className="stage-song-bpm">{song.bpm} bpm</span>}
                            <span className="stage-song-time">+{Math.round(t)}m</span>
                          </div>
                          {cue && <div className="stage-song-cue">▸ {cue}</div>}
                        </div>
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    /******************* VENUE MODAL *******************/
    function VenueModal({ open, onClose, venues, bookings, setlists, epkSettings,
      onSaveEpkSettings, onAddVenue, onUpdateVenue, onDeleteVenue,
      onAddBooking, onUpdateBooking, onDeleteBooking, bandName, showToast, onBulkAddVenues }) {
      const [vTab, setVTab] = useState('venues');
      const [venueForm, setVenueForm] = useState(null);
      const [editVenueId, setEditVenueId] = useState(null);
      const [bookingForm, setBookingForm] = useState(null);
      const [editBookingId, setEditBookingId] = useState(null);
      const _now = new Date();
      const [calYear, setCalYear] = useState(_now.getFullYear());
      const [calMon, setCalMon] = useState(_now.getMonth());
      const [localEpk, setLocalEpk] = useState(epkSettings);
      const [tplKey, setTplKey] = useState('outreach');
      const [epkDirty, setEpkDirty] = useState(false);
      const venueCsvRef = React.useRef(null);

      useEffect(() => { setLocalEpk(epkSettings); setEpkDirty(false); }, [open]);
      if (!open) return null;

      const statusInfo = (key) => VENUE_STATUSES.find(s => s.key === key) || VENUE_STATUSES[0];

      const fillAndSend = (templateKey, venue, booking) => {
        const tpl = (localEpk.templates || {})[templateKey] || EMAIL_TEMPLATES_DEFAULT[templateKey];
        const repl = {
          '{{band_name}}': bandName || '',
          '{{venue_name}}': venue?.name || '',
          '{{contact_name}}': venue?.contactName || venue?.name || '',
          '{{epk_link}}': localEpk.epkUrl || '[EPK Link]',
          '{{demo_link}}': localEpk.demoVideoUrl || '[Demo Link]',
          '{{website}}': localEpk.website || '',
          '{{contact_email}}': localEpk.contactEmail || '',
          '{{contact_phone}}': localEpk.contactPhone || '',
          '{{date}}': booking?.date || '',
          '{{start_time}}': booking?.startTime || '',
          '{{fee}}': booking?.fee || '',
        };
        let subj = tpl.subject; let body = tpl.body;
        Object.entries(repl).forEach(([k, v]) => { subj = subj.split(k).join(v); body = body.split(k).join(v); });
        const to = venue?.email || '';
        window.open(`mailto:${to}?subject=${encodeURIComponent(subj)}&body=${encodeURIComponent(body)}`);
        if (venue) {
          const today = new Date().toISOString().slice(0, 10);
          onUpdateVenue({ ...venue, lastContactDate: today, status: venue.status === 'prospect' ? 'contacted' : venue.status });
        }
      };

      const renderVenuesTab = () => {
        if (venueForm) {
          return (
            <div>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '.75rem' }}>
                <div style={{ fontWeight: 700 }}>{editVenueId ? 'Edit Venue' : 'Add Venue'}</div>
                <button className="btn btn-small" onClick={() => { setVenueForm(null); setEditVenueId(null); }}>← Back</button>
              </div>
              <div className="set-config">
                <div className="input-group"><label>Venue Name *</label><input value={venueForm.name} onChange={e => setVenueForm({...venueForm, name: e.target.value})} placeholder="The Blue Room" /></div>
                <div className="input-group"><label>Booker / Contact Name</label><input value={venueForm.contactName} onChange={e => setVenueForm({...venueForm, contactName: e.target.value})} placeholder="Jane Smith" /></div>
                <div className="input-group"><label>Email</label><input type="email" value={venueForm.email} onChange={e => setVenueForm({...venueForm, email: e.target.value})} placeholder="booking@venue.com" /></div>
                <div className="input-group"><label>Phone</label><input value={venueForm.phone} onChange={e => setVenueForm({...venueForm, phone: e.target.value})} placeholder="(555) 000-0000" /></div>
                <div className="input-group"><label>City</label><input value={venueForm.city} onChange={e => setVenueForm({...venueForm, city: e.target.value})} placeholder="Nashville" /></div>
                <div className="input-group"><label>State</label><input value={venueForm.state} onChange={e => setVenueForm({...venueForm, state: e.target.value})} placeholder="TN" /></div>
                <div className="input-group"><label>Venue Type</label>
                  <select value={venueForm.type} onChange={e => setVenueForm({...venueForm, type: e.target.value})}>
                    {VENUE_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
                  </select>
                </div>
                <div className="input-group"><label>Status</label>
                  <select value={venueForm.status} onChange={e => setVenueForm({...venueForm, status: e.target.value})}>
                    {VENUE_STATUSES.map(s => <option key={s.key} value={s.key}>{s.label}</option>)}
                  </select>
                </div>
              </div>
              <div className="input-group"><label>Website</label><input value={venueForm.website} onChange={e => setVenueForm({...venueForm, website: e.target.value})} placeholder="https://venue.com" /></div>
              <div className="input-group"><label>Notes</label><textarea value={venueForm.notes} onChange={e => setVenueForm({...venueForm, notes: e.target.value})} rows={2} placeholder="Capacity, parking, preferred genres..." style={{ resize: 'vertical' }} /></div>
              <div style={{ display: 'flex', gap: '.5rem', justifyContent: 'flex-end', marginTop: '.5rem' }}>
                <button className="btn" onClick={() => { setVenueForm(null); setEditVenueId(null); }}>Cancel</button>
                <button className="btn btn-primary" onClick={() => {
                  if (!venueForm.name.trim()) { showToast('Venue name is required', 'warning'); return; }
                  if (editVenueId) onUpdateVenue({ ...venueForm, id: editVenueId });
                  else onAddVenue(venueForm);
                  setVenueForm(null); setEditVenueId(null);
                }}>{editVenueId ? 'Save Changes' : 'Add Venue'}</button>
              </div>
            </div>
          );
        }
        const handleVenueCSV = (file) => {
          if (!file) return;
          Papa.parse(file, {
            header: true, skipEmptyLines: true,
            complete: ({ data }) => {
              if (!data.length) { showToast('No rows found in CSV', 'warning'); return; }
              const synMap = {
                name: ['name','venue','venue name','venuename'],
                email: ['email','e-mail','email address','emailaddress'],
                phone: ['phone','telephone','tel','mobile','cell'],
                contactName: ['contact','contact name','booker','booker name','contactname'],
                city: ['city','town'],
                state: ['state','province','region','st'],
                type: ['type','venue type','venuetype','category'],
                website: ['website','url','web','site'],
                notes: ['notes','note','comments','comment','description'],
                status: ['status','pipeline','stage'],
              };
              const headers = Object.keys(data[0]);
              const colMap = {};
              Object.entries(synMap).forEach(([field, syns]) => {
                const orig = headers.find(h => syns.includes(h.trim().toLowerCase()));
                if (orig) colMap[field] = orig;
              });
              if (!colMap.name) { showToast('CSV must have a Name or Venue column', 'warning'); return; }
              const parsed = data.map(row => {
                const v = {};
                Object.entries(colMap).forEach(([field, col]) => { v[field] = (row[col] || '').trim(); });
                return v;
              }).filter(v => v.name);
              if (!parsed.length) { showToast('No valid venue rows found', 'warning'); return; }
              onBulkAddVenues(parsed);
            },
            error: () => showToast('Error parsing CSV', 'error'),
          });
        };
        const downloadSampleVenueCSV = () => {
          const csv = 'Name,Email,Phone,Contact Name,City,State,Venue Type,Website,Status,Notes\n' +
            'The Blue Room,booking@blueroom.com,(555) 000-0000,Jane Smith,Nashville,TN,Bar,https://blueroom.com,prospect,Great capacity\n' +
            'The Jazz Lounge,info@jazzlounge.com,(555) 111-2222,Mark Davis,Austin,TX,Club,https://jazzlounge.com,prospect,Great acoustics';
          const blob = new Blob([csv], { type: 'text/csv' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a'); a.href = url; a.download = 'venue-import-sample.csv'; a.click();
          URL.revokeObjectURL(url);
        };
        const sortedVenues = [...venues].sort((a, b) => (VENUE_STATUS_ORDER[a.status] ?? 4) - (VENUE_STATUS_ORDER[b.status] ?? 4));
        return (
          <div>
            <input ref={venueCsvRef} type="file" accept=".csv" style={{ display: 'none' }}
              onChange={e => { handleVenueCSV(e.target.files[0]); e.target.value = ''; }} />
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '.65rem', flexWrap: 'wrap', gap: '.35rem' }}>
              <div style={{ fontSize: '.8rem', color: 'var(--text-muted)' }}>{venues.length} venue{venues.length !== 1 ? 's' : ''}</div>
              <div style={{ display: 'flex', gap: '.35rem', flexWrap: 'wrap' }}>
                <button className="btn btn-small" onClick={downloadSampleVenueCSV} title="Download sample CSV template" style={{ fontSize: '.68rem', color: 'var(--text-muted)' }}>⬇ Sample CSV</button>
                <button className="btn btn-small" onClick={() => venueCsvRef.current?.click()} title="Bulk-import venues from a CSV file" style={{ fontSize: '.68rem' }}>⬆ Import CSV</button>
                <button className="btn btn-small btn-primary" onClick={() => setVenueForm({...BLANK_VENUE})}>+ Add Venue</button>
              </div>
            </div>
            {venues.length === 0 && (
              <div style={{ textAlign: 'center', color: 'var(--text-muted)', padding: '2.5rem 1rem' }}>
                No venues yet. Add your first prospect to start building your pipeline.
              </div>
            )}
            {sortedVenues.map(venue => {
              const si = statusInfo(venue.status);
              const confirmedBooking = bookings.find(b => b.venueId === venue.id && b.status === 'confirmed');
              return (
                <div key={venue.id} className="venue-item">
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: '.5rem' }}>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ display: 'flex', gap: '.4rem', alignItems: 'center', flexWrap: 'wrap', marginBottom: '.2rem' }}>
                        <span style={{ fontWeight: 700 }}>{venue.name}</span>
                        <span className="venue-status-badge" style={{ background: si.color, color: si.key === 'booked' || si.key === 'responded' || si.key === 'prospect' ? '#111' : '#fff' }}>{si.label}</span>
                        <span style={{ fontSize: '.72rem', color: 'var(--text-muted)' }}>{venue.type}</span>
                      </div>
                      <div style={{ fontSize: '.75rem', color: 'var(--text-muted)' }}>
                        {venue.contactName && <span>{venue.contactName} · </span>}
                        {venue.city && <span>{venue.city}{venue.state ? ', ' + venue.state : ''}{venue.email ? ' · ' : ''}</span>}
                        {venue.email && <span>{venue.email}</span>}
                      </div>
                      {venue.lastContactDate && (
                        <div style={{ fontSize: '.7rem', color: 'var(--accent)', marginTop: '.15rem' }}>Last contact: {venue.lastContactDate}</div>
                      )}
                    </div>
                    <div style={{ display: 'flex', gap: '.25rem', flexShrink: 0 }}>
                      <button className="btn btn-small" onClick={() => { setVenueForm({...venue}); setEditVenueId(venue.id); }} title="Edit">✏️</button>
                      <button className="btn btn-small" onClick={() => onDeleteVenue(venue.id)} style={{ color: 'var(--error)', borderColor: 'var(--error)' }} title="Delete">✕</button>
                    </div>
                  </div>
                  <div className="venue-email-actions">
                    {Object.entries(EMAIL_TEMPLATES_DEFAULT).map(([key, def]) => (
                      <button key={key} className="btn btn-small"
                        onClick={() => fillAndSend(key, venue, confirmedBooking)}
                        style={{ fontSize: '.68rem', borderColor: '#60a5fa', color: '#60a5fa' }}
                        title={`Open email: ${def.label}`}>
                        ✉ {def.label}
                      </button>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        );
      };

      const renderBookingsTab = () => {
        const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
        const dim = new Date(calYear, calMon + 1, 0).getDate();
        const fd = new Date(calYear, calMon, 1).getDay();
        const cells = [...Array(fd).fill(null), ...Array.from({length: dim}, (_, i) => i + 1)];
        while (cells.length % 7) cells.push(null);
        const weeks = [];
        for (let i = 0; i < cells.length; i += 7) weeks.push(cells.slice(i, i + 7));
        const bookingsByDay = {};
        bookings.filter(b => {
          if (!b.date) return false;
          const [y, m] = b.date.split('-').map(Number);
          return y === calYear && m - 1 === calMon;
        }).forEach(b => {
          const d = parseInt(b.date.split('-')[2]);
          if (!bookingsByDay[d]) bookingsByDay[d] = [];
          bookingsByDay[d].push(b);
        });
        const todayStr = new Date().toISOString().slice(0, 10);

        return (
          <div>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '.5rem' }}>
              <button className="btn btn-small" onClick={() => { const p = new Date(calYear, calMon - 1, 1); setCalYear(p.getFullYear()); setCalMon(p.getMonth()); }}>‹</button>
              <span style={{ fontFamily: 'Space Mono, monospace', fontSize: '.88rem', fontWeight: 700 }}>{MONTH_NAMES[calMon]} {calYear}</span>
              <button className="btn btn-small" onClick={() => { const n = new Date(calYear, calMon + 1, 1); setCalYear(n.getFullYear()); setCalMon(n.getMonth()); }}>›</button>
            </div>
            <div className="booking-cal-grid">
              {['Su','Mo','Tu','We','Th','Fr','Sa'].map(d => <div key={d} className="booking-cal-dow">{d}</div>)}
              {weeks.flat().map((day, i) => {
                const dateStr = day ? `${calYear}-${String(calMon+1).padStart(2,'0')}-${String(day).padStart(2,'0')}` : null;
                const dayB = day ? (bookingsByDay[day] || []) : [];
                const isToday = dateStr === todayStr;
                return (
                  <div key={i} className={`booking-cal-cell${isToday ? ' cal-today' : ''}${!day ? ' cal-empty' : ''}`}>
                    {day && <div className="booking-cal-daynum">{day}</div>}
                    {dayB.map(b => (
                      <div key={b.id} className={`booking-cal-event ${b.status}`} title={`${b.venueName} ${b.startTime || ''}`}>
                        {(b.venueName || 'Gig').slice(0, 9)}
                      </div>
                    ))}
                  </div>
                );
              })}
            </div>

            <div style={{ borderTop: '1px solid var(--border)', paddingTop: '.65rem', marginTop: '.25rem' }}>
              {bookingForm ? (
                <div>
                  <div style={{ fontWeight: 700, marginBottom: '.5rem' }}>{editBookingId ? 'Edit Booking' : 'Add Booking'}</div>
                  <div className="set-config">
                    <div className="input-group"><label>Venue *</label>
                      <select value={bookingForm.venueId} onChange={e => { const v = venues.find(x => x.id === e.target.value); setBookingForm({...bookingForm, venueId: e.target.value, venueName: v?.name || ''}); }}>
                        <option value="">— Select Venue —</option>
                        {venues.map(v => <option key={v.id} value={v.id}>{v.name}</option>)}
                      </select>
                    </div>
                    <div className="input-group"><label>Status</label>
                      <select value={bookingForm.status} onChange={e => setBookingForm({...bookingForm, status: e.target.value})}>
                        <option value="pending">Pending</option>
                        <option value="confirmed">Confirmed</option>
                        <option value="completed">Completed</option>
                        <option value="cancelled">Cancelled</option>
                      </select>
                    </div>
                    <div className="input-group"><label>Date *</label><input type="date" value={bookingForm.date} onChange={e => setBookingForm({...bookingForm, date: e.target.value})} /></div>
                    <div className="input-group"><label>Fee</label><input value={bookingForm.fee} onChange={e => setBookingForm({...bookingForm, fee: e.target.value})} placeholder="$500" /></div>
                    <div className="input-group"><label>Start Time</label><input type="time" value={bookingForm.startTime} onChange={e => setBookingForm({...bookingForm, startTime: e.target.value})} /></div>
                    <div className="input-group"><label>End Time</label><input type="time" value={bookingForm.endTime} onChange={e => setBookingForm({...bookingForm, endTime: e.target.value})} /></div>
                    {setlists && setlists.length > 0 && (
                      <div className="input-group"><label>Setlist</label>
                        <select value={bookingForm.setlistId || ''} onChange={e => setBookingForm({...bookingForm, setlistId: e.target.value})}>
                          <option value="">— None —</option>
                          {setlists.map(sl => <option key={sl.id} value={sl.id}>{sl.name}</option>)}
                        </select>
                      </div>
                    )}
                  </div>
                  <div className="input-group"><label>Notes</label><textarea value={bookingForm.notes} onChange={e => setBookingForm({...bookingForm, notes: e.target.value})} rows={2} style={{ resize: 'vertical' }} /></div>
                  <div style={{ display: 'flex', gap: '.5rem', justifyContent: 'flex-end' }}>
                    <button className="btn" onClick={() => { setBookingForm(null); setEditBookingId(null); }}>Cancel</button>
                    <button className="btn btn-primary" onClick={() => {
                      if (!bookingForm.date || !bookingForm.venueId) { showToast('Date and venue are required', 'warning'); return; }
                      if (editBookingId) onUpdateBooking({ ...bookingForm, id: editBookingId });
                      else onAddBooking(bookingForm);
                      setBookingForm(null); setEditBookingId(null);
                    }}>{editBookingId ? 'Save' : 'Add Booking'}</button>
                  </div>
                </div>
              ) : (
                <div>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '.5rem' }}>
                    <div style={{ fontSize: '.8rem', color: 'var(--text-muted)' }}>All Bookings ({bookings.length})</div>
                    <button className="btn btn-small btn-primary" onClick={() => setBookingForm({...BLANK_BOOKING})}>+ Add</button>
                  </div>
                  {bookings.length === 0 && <div style={{ color: 'var(--text-muted)', fontSize: '.85rem', textAlign: 'center', padding: '1rem' }}>No bookings yet.</div>}
                  {[...bookings].sort((a, b) => (a.date || '').localeCompare(b.date || '')).map(b => {
                    const sc = b.status === 'confirmed' ? 'var(--success)' : b.status === 'cancelled' ? 'var(--error)' : b.status === 'completed' ? '#888' : 'var(--warning)';
                    const linkedSetlist = b.setlistId && setlists ? setlists.find(sl => sl.id === b.setlistId) : null;
                    const bookingVenue = venues.find(v => v.id === b.venueId);
                    return (
                      <div key={b.id} style={{ background: 'var(--primary)', border: '1px solid var(--border)', borderRadius: 8, padding: '.5rem .65rem', marginBottom: '.35rem', display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: '.5rem' }}>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ fontWeight: 600, fontSize: '.88rem' }}>{b.venueName || '—'}</div>
                          <div style={{ fontSize: '.75rem', color: 'var(--text-muted)' }}>
                            {b.date}{b.startTime && ` · ${b.startTime}`}{b.fee && ` · ${b.fee}`}
                            <span style={{ marginLeft: '.4rem', color: sc, fontWeight: 700, fontSize: '.65rem' }}>{b.status.toUpperCase()}</span>
                          </div>
                          {linkedSetlist && <div style={{ fontSize: '.72rem', color: 'var(--accent)', marginTop: '.1rem' }}>🎵 {linkedSetlist.name}</div>}
                          {b.notes && <div style={{ fontSize: '.72rem', color: 'var(--text-muted)', fontStyle: 'italic' }}>{b.notes}</div>}
                        </div>
                        <div style={{ display: 'flex', gap: '.25rem' }}>
                          {bookingVenue?.email && (
                            <button className="btn btn-small" title="Send booking confirmation email"
                              style={{ color: '#60a5fa', borderColor: '#60a5fa' }}
                              onClick={() => fillAndSend('bookingConfirmation', bookingVenue, b)}>✉</button>
                          )}
                          <button className="btn btn-small" onClick={() => {
                            setBookingForm({...b}); setEditBookingId(b.id);
                            if (b.date) { const [y, m] = b.date.split('-').map(Number); setCalYear(y); setCalMon(m - 1); }
                          }}>✏️</button>
